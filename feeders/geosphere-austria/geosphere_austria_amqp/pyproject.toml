[project]
      name = "geosphere_austria_amqp"
      version = "0.1.0"
      description = "geosphere-austria AMQP companion feeder"
      requires-python = ">=3.10"
      dependencies = [
        "python-qpid-proton>=0.39.0",
"azure-identity>=1.16.0",
    "geosphere_austria_core",
]

      [build-system]
      requires = ["setuptools>=68"]
      build-backend = "setuptools.build_meta"

      [tool.setuptools]
      packages = ["geosphere_austria_amqp"]

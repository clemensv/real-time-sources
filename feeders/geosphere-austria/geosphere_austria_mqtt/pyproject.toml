[project]
name = "geosphere_austria_mqtt"
version = "0.1.0"
description = "geosphere-austria MQTT companion feeder"
requires-python = ">=3.10"
dependencies = [
  "paho-mqtt>=2.1.0",
  "geosphere_austria_core",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["geosphere_austria_mqtt"]

[tool.uv.sources]
geosphere_austria_core = { path = "../geosphere_austria_core" }

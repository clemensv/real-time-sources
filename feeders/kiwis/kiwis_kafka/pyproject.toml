[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "kiwis_kafka"
dynamic = ["version"]
description = "Kafka feeder for generalized KiWIS endpoints."
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.11.3",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "confluent-kafka>=2.5.3",
]

[project.scripts]
kiwis-kafka = "kiwis_kafka.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["kiwis_kafka"]

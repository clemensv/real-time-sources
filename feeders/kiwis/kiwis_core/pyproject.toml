[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "kiwis_core"
dynamic = ["version"]
description = "Transport-neutral KiWIS acquisition and normalization."
requires-python = ">=3.10,<4.0"
dependencies = ["cryptography>=48.0.1","requests>=2.32.3", "urllib3>=2.2.1"]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["kiwis_core"]
include-package-data = true

[tool.setuptools.package-data]
kiwis_core = ["sources/*.json"]

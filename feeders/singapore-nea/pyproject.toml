[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "singapore-nea"
version = "0.1.0"
description = "Bridge between Singapore NEA weather observations and Kafka endpoints"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.34.2"
urllib3 = ">=2.7.0"  # CVE pin (transitive via requests)
idna = ">=3.15"  # CVE pin (transitive via requests)
confluent-kafka = ">=2.14.2"
cloudevents = ">=1.12.1,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.12.1"
singapore_nea_producer_data = {path = "singapore_nea_producer/singapore_nea_producer_data"}
singapore_nea_producer_kafka_producer = {path = "singapore_nea_producer/singapore_nea_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=9.0.3"
pytest-cov = ">=7.1.0"
testcontainers = ">=4.14.2"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
singapore-nea = "singapore_nea:main"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ndw-road-traffic-amqp"
version = "0.1.0"
description = "AMQP companion feeder for NDW Road Traffic"
requires-python = ">=3.10"
dependencies = [
    "python-qpid-proton>=0.40.0",
    "ndw-road-traffic-core",
]

[project.scripts]
ndw-road-traffic-amqp = "ndw_road_traffic_amqp.app:main"

[tool.setuptools.packages.find]
include = ["ndw_road_traffic_amqp*"]

[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "ndw-road-traffic-core"
dynamic = ["version"]
description = "Transport-neutral parsing and acquisition logic for the NDW road-traffic bridge"
authors = [{ name = "Clemens Vasters", email = "clemensv@microsoft.com" }]
requires-python = ">=3.10,<4.0"
dependencies = [
    "requests>=2.32.3",
    "urllib3>=2.7.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["ndw_road_traffic_core"]
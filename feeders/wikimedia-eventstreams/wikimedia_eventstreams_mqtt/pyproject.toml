[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "wikimedia-eventstreams-mqtt"
version = "0.1.0"
description = "Wikimedia EventStreams firehose -> MQTT/UNS non-retained bridge"
authors = ["clemensv"]
packages = [{include = "wikimedia_eventstreams_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.9"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
azure-identity = ">=1.17.0"
wikimedia_eventstreams_mqtt_producer_data = {path = "../wikimedia_eventstreams_mqtt_producer/wikimedia_eventstreams_mqtt_producer_data"}
wikimedia_eventstreams_mqtt_producer_mqtt_client = {path = "../wikimedia_eventstreams_mqtt_producer/wikimedia_eventstreams_mqtt_producer_mqtt_client"}

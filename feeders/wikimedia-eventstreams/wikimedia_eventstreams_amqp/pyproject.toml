[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wikimedia-eventstreams-amqp"
version = "0.1.0"
description = "AMQP 1.0 feeder for Wikimedia EventStreams"
requires-python = ">=3.10"
dependencies = [
    "wikimedia_eventstreams_core",
    "python-qpid-proton>=0.40.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "avro>=1.11.3",
    "azure-identity>=1.17.0",
    "azure-core>=1.30.0",
    "aiohttp>=3.14.1",
]

[project.scripts]
wikimedia-eventstreams-amqp = "wikimedia_eventstreams_amqp.app:main"

[tool.setuptools.packages.find]
include = ["wikimedia_eventstreams_amqp*"]

[tool.uv.sources]
wikimedia_eventstreams_core = { path = "../wikimedia_eventstreams_core" }

[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "wikimedia_eventstreams_core"
dynamic = ["version"]
description = "Transport-neutral acquisition for Wikimedia EventStreams bridges."
authors = [{ name = "Clemens Vasters", email = "clemensv@microsoft.com" }]
requires-python = ">=3.10,<4.0"
dependencies = [
    "cryptography>=48.0.1",
    "aiohttp>=3.14.1",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["wikimedia_eventstreams_core"]

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "wikimedia-eventstreams"
dynamic = [
    "version",
]
description = "Wikimedia EventStreams recentchange bridge to Kafka as CloudEvents"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "wikimedia_eventstreams_core",
    "aiohttp>=3.14.1",
    "avro>=1.12.1",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses_json>=0.6.7",
]

[project.scripts]
wikimedia-eventstreams = "wikimedia_eventstreams.wikimedia_eventstreams:main"

[project.optional-dependencies]
dev = [
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=7.1.0",
    "pytest>=9.0.3",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "wikimedia_eventstreams",
]

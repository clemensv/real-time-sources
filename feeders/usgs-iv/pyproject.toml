[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "usgs-iv"
dynamic = [
    "version",
]
description = "USGS Instantaneous Values Bridge"
authors = [
    { name = "Clemens Vasters" },
]
requires-python = "<4.0,>=3.10"
dependencies = [
    "aiohttp>=3.14.0",
    "asyncio>=3.4.3",
    "avro>=1.12.1,<2.0.0",
    "cloudevents>=1.12.1,<3.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses-json>=0.6.7,<0.7.0",
    "gtfs-realtime-bindings>=1.0.0",
    "idna>=3.15",
    "requests>=2.34.2",
    "urllib3>=2.7.0",
]

[project.scripts]
usgs-iv = "usgs_iv.usgs_iv:main"

[project.optional-dependencies]
dev = [
    "flake8>=7.1.1",
    "mypy>=1.20.2",
    "pylint>=3.2.7",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=7.1.0,<8.0.0",
    "pytest>=9.0.3",
    "requests-mock>=1.12.1,<2.0.0",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "usgs_iv",
]

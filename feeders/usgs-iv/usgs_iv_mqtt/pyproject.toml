[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "usgs-iv-mqtt"
version = "0.1.0"
description = "USGS Instantaneous Values bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
requests = ">=2.32.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
usgs_iv_producer_data = {path = "../usgs_iv_producer/usgs_iv_producer_data"}
usgs_iv_mqtt_producer_data = {path = "../usgs_iv_mqtt_producer/usgs_iv_mqtt_producer_data"}
usgs_iv_mqtt_producer_mqtt_client = {path = "../usgs_iv_mqtt_producer/usgs_iv_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
usgs-iv-mqtt = "usgs_iv_mqtt:main"

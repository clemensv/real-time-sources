[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "gdacs-mqtt"
dynamic = [
    "version",
]
description = "GDACS bridge to MQTT/UNS"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "gdacs_core @ file:../gdacs_core",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "paho-mqtt>=2.1.0",
]

[project.scripts]
gdacs-mqtt = "gdacs_mqtt:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "gdacs_mqtt",
]

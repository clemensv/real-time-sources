[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "digitraffic-maritime-amqp"
dynamic = [
    "version",
]
description = "Digitraffic Maritime AMQP feeder"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "azure-identity>=1.17.0",
    "requests>=2.32.3",
]

[project.scripts]
digitraffic-maritime-amqp = "digitraffic_maritime_amqp.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "digitraffic_maritime_amqp",
]

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "digitraffic-maritime"
dynamic = [
    "version",
]
description = "Digitraffic Marine AIS bridge — Finnish/Baltic vessel tracking data to Kafka as CloudEvents"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.12.1,<3.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses_json>=0.6.7",
    "paho-mqtt>=2.0.0",
    "requests>=2.34.2",
]

[project.scripts]
digitraffic-maritime = "digitraffic_maritime:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
    "pytest>=9.0.3",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "digitraffic_maritime",
    "digitraffic_maritime_producer_data",
]

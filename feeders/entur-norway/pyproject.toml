[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "entur-norway"
dynamic = [
    "version",
]
description = "Entur Norway national real-time transit SIRI bridge to Apache Kafka"
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses_json>=0.6.7",
    "requests>=2.34.2",
    "entur_norway_core",
]

[project.scripts]
entur-norway = "entur_norway:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
    "pytest>=9.0.3",
    "requests-mock>=1.12.1",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "entur_norway",
]

[tool.uv.sources]
entur_norway_core = { path = "entur_norway_core" }

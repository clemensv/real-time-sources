[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "ptwc_tsunami_amqp"
dynamic = [
    "version",
]
description = "AMQP 1.0 companion feeder for ptwc-tsunami."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "azure-core>=1.30.0",
    "azure-identity>=1.17.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "python-qpid-proton>=0.40.0",
    "ptwc_tsunami_core",

]

[project.scripts]
ptwc-tsunami-amqp = "ptwc_tsunami_amqp.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "ptwc_tsunami_amqp",
]

[tool.uv.sources]
ptwc_tsunami_core = { path = "../ptwc_tsunami_core" }

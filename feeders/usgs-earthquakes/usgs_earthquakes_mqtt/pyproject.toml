[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "usgs-earthquakes-mqtt"
version = "0.1.0"
description = "USGS Earthquakes bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
usgs_earthquakes_producer_data = {path = "../usgs_earthquakes_producer/usgs_earthquakes_producer_data"}
usgs_earthquakes_mqtt_producer_data = {path = "../usgs_earthquakes_mqtt_producer/usgs_earthquakes_mqtt_producer_data"}
usgs_earthquakes_mqtt_producer_mqtt_client = {path = "../usgs_earthquakes_mqtt_producer/usgs_earthquakes_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
usgs-earthquakes-mqtt = "usgs_earthquakes_mqtt:main"

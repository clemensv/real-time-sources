[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "dwd_core"
dynamic = ["version"]
requires-python = ">=3.10,<4.0"
dependencies = [
    "requests>=2.32.3",
    "dwd-producer-data",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["dwd_core"]

[tool.uv.sources]
"dwd-producer-data" = { path = "../dwd_producer/dwd_producer_data" }

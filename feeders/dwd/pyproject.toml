[build-system]
requires = [
    "setuptools>=82.0.1",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "dwd"
dynamic = [
    "version",
]
description = "DWD (Deutscher Wetterdienst) open data bridge — emits weather observations, alerts, and station metadata as CloudEvents to Kafka"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=2.2.0,<3.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses_json>=0.6.7",
    "eccodes>=2.47.0",
    "numpy>=2.2.6",
    "requests>=2.34.2",
]

[project.scripts]
dwd = "dwd:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
    "pytest>=9.1.0",
    "requests-mock>=1.12.1",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "dwd",
    "dwd.modules",
    "dwd.parsers",
    "dwd.util",
]

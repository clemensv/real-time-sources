[project]
      name = "jma_japan_amqp"
      version = "0.1.0"
      description = "jma-japan AMQP companion feeder"
      requires-python = ">=3.10"
      dependencies = [
        "python-qpid-proton>=0.39.0",
"azure-identity>=1.16.0",
    "jma_japan_core",
]

      [build-system]
      requires = ["setuptools>=68"]
      build-backend = "setuptools.build_meta"

      [tool.setuptools]
      packages = ["jma_japan_amqp"]

[tool.uv.sources]
jma_japan_core = { path = "../jma_japan_core" }

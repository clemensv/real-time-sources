[project]
name = "jma_japan_mqtt"
version = "0.1.0"
description = "jma-japan MQTT companion feeder"
requires-python = ">=3.10"
dependencies = [
  "paho-mqtt>=2.1.0",
  "jma_japan_core",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["jma_japan_mqtt"]

[tool.uv.sources]
jma_japan_core = { path = "../jma_japan_core" }

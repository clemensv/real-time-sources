[project]
      name = "kmi_belgium_amqp"
      version = "0.1.0"
      description = "kmi-belgium AMQP companion feeder"
      requires-python = ">=3.10"
      dependencies = [
        "python-qpid-proton>=0.39.0",
"azure-identity>=1.16.0",
    "kmi_belgium_core",
]

      [build-system]
      requires = ["setuptools>=68"]
      build-backend = "setuptools.build_meta"

      [tool.setuptools]
      packages = ["kmi_belgium_amqp"]

[tool.uv.sources]
kmi_belgium_core = { path = "../kmi_belgium_core" }

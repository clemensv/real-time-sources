[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "kmi-belgium"
dynamic = [
    "version",
]
description = "Bridge between KMI/RMI automatic weather station observations and Kafka endpoints"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses_json>=0.6.7",
    "idna>=3.15",
    "requests>=2.34.2",
    "urllib3>=2.7.0",
    "kmi_belgium_core",
]

[project.scripts]
kmi-belgium = "kmi_belgium:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
    "pytest>=9.0.3",
    "requests-mock>=1.12.1",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "kmi_belgium",
]

[tool.uv.sources]
kmi_belgium_core = { path = "kmi_belgium_core" }

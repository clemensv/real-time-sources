[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "eaws-albina-mqtt"
dynamic = [
    "version",
]
description = "EAWS ALBINA bridge to MQTT/UNS"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "paho-mqtt>=2.1.0",
    "requests>=2.32.3",
    "eaws_albina_core",

]

[project.scripts]
eaws-albina-mqtt = "eaws_albina_mqtt:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "eaws_albina_mqtt",
]

[tool.uv.sources]
eaws_albina_core = { path = "../eaws_albina_core" }

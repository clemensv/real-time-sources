[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "eaws-albina-mqtt"
version = "0.1.0"
description = "EAWS ALBINA bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
requests = ">=2.32.3"
eaws_albina_producer_data = {path = "../eaws_albina_producer/eaws_albina_producer_data"}
eaws_albina_mqtt_producer_data = {path = "../eaws_albina_mqtt_producer/eaws_albina_mqtt_producer_data"}
eaws_albina_mqtt_producer_mqtt_client = {path = "../eaws_albina_mqtt_producer/eaws_albina_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
eaws-albina-mqtt = "eaws_albina_mqtt:main"

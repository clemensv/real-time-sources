[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "kystverket-ais-mqtt"
dynamic = [
    "version",
]
description = "Kystverket AIS firehose -> MQTT/UNS non-retained bridge"
authors = [
    { name = "clemensv" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "kystverket_ais_core",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "paho-mqtt>=2.1.0",
    "pyais>=2.7.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "kystverket_ais_mqtt",
]

[tool.setuptools.package-data]
kystverket_ais_mqtt = ["*.csv"]

[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "nina_bbk_core"
dynamic = ["version"]
requires-python = ">=3.10,<4.0"
dependencies = [
    "aiohttp>=3.14.0",
    "nina-bbk-producer-data",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["nina_bbk_core"]

[tool.uv.sources]
"nina-bbk-producer-data" = { path = "../nina_bbk_producer/nina_bbk_producer_data" }

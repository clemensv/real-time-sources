[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "nina-bbk"
dynamic = [
    "version",
]
description = "NINA/BBK German civil protection warnings bridge"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "aiohttp>=3.14.1",
    "avro>=1.12.1",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses-json>=0.6.7",
    "nina_bbk_core",

]

[project.scripts]
nina-bbk = "nina_bbk.nina_bbk:main"

[project.optional-dependencies]
dev = [
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=7.1.0",
    "pytest>=9.0.3",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "nina_bbk",
]

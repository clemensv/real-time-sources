[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "tfl-road-traffic-mqtt"
dynamic = [
    "version",
]
description = "Transport for London road traffic MQTT/UNS bridge"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "azure-identity>=1.17.0",
    "paho-mqtt>=2.1.0",
    "requests>=2.32.3",
    "tfl_road_traffic_core",
]

[project.scripts]
tfl-road-traffic-mqtt = "tfl_road_traffic_mqtt.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "tfl_road_traffic_mqtt",
]

[tool.uv.sources]
tfl_road_traffic_core = { path = "../tfl_road_traffic_core" }

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "tfl-road-traffic"
dynamic = [
    "version",
]
description = "Transport for London (TfL) road traffic bridge to Apache Kafka"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.12.1,<3.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses-json>=0.6.7",
    "requests>=2.34.2",
]

[project.scripts]
tfl-road-traffic = "tfl_road_traffic:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "tfl_road_traffic",
]

[build-system]
requires=["setuptools>=68.0","wheel"]
build-backend="setuptools.build_meta"
[project]
name="nifc-usa-wildfires-amqp"
version="0.1.0"
description="AMQP feeder for NIFC USA wildfires"
requires-python=">=3.10"
dependencies=["aiohttp>=3.14.1","python-qpid-proton>=0.40.0","cloudevents>=1.11.0,<2.0.0","dataclasses_json>=0.6.7","avro>=1.11.3","azure-identity>=1.17.0","azure-core>=1.30.0"]
[project.scripts]
nifc-usa-wildfires-amqp="nifc_usa_wildfires_amqp.app:main"
[tool.setuptools.packages.find]
include=["nifc_usa_wildfires_amqp*"]

[project]
      name = "smhi_weather_amqp"
      version = "0.1.0"
      description = "smhi-weather AMQP companion feeder"
      requires-python = ">=3.10"
      dependencies = [
        "python-qpid-proton>=0.39.0",
"azure-identity>=1.16.0",
    "smhi_weather_core",
]

      [build-system]
      requires = ["setuptools>=68"]
      build-backend = "setuptools.build_meta"

      [tool.setuptools]
      packages = ["smhi_weather_amqp"]

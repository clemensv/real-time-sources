[build-system]
requires = [
    "setuptools>=83.0.0",
    "setuptools-scm>=10.2.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "smhi-weather"
dynamic = [
    "version",
]
description = "Bridge between SMHI meteorological observations and Kafka endpoints"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.10.1,<2.0.0",
    "confluent-kafka>=2.15.0",
    "dataclasses_json>=0.6.7",
    "idna>=3.18",
    "requests>=2.34.2",
    "urllib3>=2.7.0",
    "smhi_weather_core",
]

[project.scripts]
smhi-weather = "smhi_weather:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
    "pytest>=9.1.1",
    "requests-mock>=1.12.1",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "smhi_weather",
]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "gbfs_bikeshare_kafka"
version = "0.1.0"
description = "Kafka feeder for configurable GBFS bikeshare systems."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "gbfs_bikeshare" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
gbfs_bikeshare_core = { path = "../gbfs_bikeshare_core" }
gbfs_bikeshare_producer_data = { path = "../gbfs_bikeshare_producer/gbfs_bikeshare_producer_data" }
gbfs_bikeshare_producer_kafka_producer = { path = "../gbfs_bikeshare_producer/gbfs_bikeshare_producer_kafka_producer" }

[tool.poetry.scripts]
gbfs-bikeshare-kafka = "gbfs_bikeshare.app:main"

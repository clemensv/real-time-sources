[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "gbfs_bikeshare_core"
version = "0.1.0"
description = "Transport-agnostic GBFS bikeshare acquisition and normalization."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "gbfs_bikeshare_core" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
urllib3 = ">=2.2.1"
idna = ">=3.7"

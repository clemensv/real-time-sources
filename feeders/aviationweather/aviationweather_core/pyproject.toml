[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "aviationweather_core"
dynamic = ["version"]
description = "Transport-agnostic acquisition for the AviationWeather.gov bridge."
authors = [{ name = "Clemens Vasters", email = "clemensv@microsoft.com" }]
requires-python = ">=3.10,<4.0"
dependencies = [
    "requests>=2.32.3",
    "urllib3>=2.7.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["aviationweather_core"]

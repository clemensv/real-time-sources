[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "aviationweather_mqtt"
dynamic = ["version"]
description = "MQTT companion feeder for aviationweather."
authors = [{ name = "Clemens Vasters", email = "clemensv@microsoft.com" }]
requires-python = ">=3.10,<4.0"
dependencies = [
    "paho-mqtt>=2.1.0",
    "aviationweather_core",
]

[project.scripts]
aviationweather-mqtt = "aviationweather_mqtt.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["aviationweather_mqtt"]

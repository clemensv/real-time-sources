[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "madrid-traffic"
dynamic = [
    "version",
]
description = "Madrid Real-Time Traffic (Informo) bridge to Apache Kafka"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1,<2.0.0",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses-json>=0.6.7",
    "requests>=2.31.0",
    "madrid_traffic_core",
]

[project.scripts]
madrid-traffic = "madrid_traffic:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "madrid_traffic",
]

[tool.uv.sources]
madrid_traffic_core = { path = "madrid_traffic_core" }

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "noaa-goes-mqtt"
version = "0.1.0"
description = "MQTT feeder for noaa-goes"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "noaa_goes_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
noaa_goes_mqtt_producer_data = { path = "../noaa_goes_mqtt_producer/noaa_goes_mqtt_producer_data" }
noaa_goes_mqtt_producer_mqtt_client = { path = "../noaa_goes_mqtt_producer/noaa_goes_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
noaa-goes-mqtt = "noaa_goes_mqtt.app:main"

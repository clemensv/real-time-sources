[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "noaa_swpc_l1_amqp"
dynamic = [
    "version",
]
description = "AMQP 1.0 feeder for the NOAA SWPC L1 propagated solar wind product."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "azure-identity>=1.17.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "python-qpid-proton>=0.39.0",
    "requests>=2.32.3",
]

[project.scripts]
noaa-swpc-l1-amqp = "noaa_swpc_l1_amqp.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "noaa_swpc_l1_amqp",
]

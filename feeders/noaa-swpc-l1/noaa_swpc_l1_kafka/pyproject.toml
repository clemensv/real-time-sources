[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "noaa_swpc_l1_kafka"
dynamic = [
    "version",
]
description = "Kafka feeder for the NOAA SWPC L1 propagated solar wind product."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=2.2.0,<3.0.0",
    "confluent-kafka>=2.5.3",
    "dataclasses_json>=0.6.7",
]

[project.scripts]
noaa-swpc-l1-kafka = "noaa_swpc_l1_kafka.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "noaa_swpc_l1_kafka",
]

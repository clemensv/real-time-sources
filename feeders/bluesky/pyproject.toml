[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "bluesky-firehose-producer"
dynamic = [
    "version",
]
description = "Bluesky AT Protocol Firehose Bridge for real-time events"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<3.15"
dependencies = [
    "bluesky_core",
    "aiohttp>=3.14.1",
    "asyncio>=3.4.3",
    "atproto>=0.0.63",
    "avro>=1.12.1,<2.0.0",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses-json>=0.6.7",
    "idna>=3.15",
    "pydantic>=2.7.0",
    "urllib3>=2.7.0",
]

[project.scripts]
bluesky_firehose = "bluesky.bluesky:main"

[project.optional-dependencies]
dev = [
    "flake8>=7.1.1",
    "mypy>=1.11.2",
    "pylint>=3.2.7",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=7.1.0",
    "pytest>=9.0.3",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "bluesky",
]

[tool.uv.sources]
bluesky_core = { path = "bluesky_core" }

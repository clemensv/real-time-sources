[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "bluesky_core"
dynamic = ["version"]
description = "Transport-neutral acquisition for Bluesky firehose bridges."
authors = [{ name = "Clemens Vasters", email = "clemensv@microsoft.com" }]
requires-python = ">=3.10,<3.15"
dependencies = [
    "aiohttp>=3.14.0",
    "atproto>=0.0.63",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["bluesky_core"]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "bluesky-mqtt"
version = "0.1.0"
description = "Bluesky AT Protocol firehose -> MQTT/UNS non-retained bridge"
authors = ["clemensv"]
packages = [{include = "bluesky_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
atproto = ">=0.0.46"
aiohttp = ">=3.9"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
azure-identity = ">=1.17.0"
bluesky_mqtt_producer_data = {path = "../bluesky_mqtt_producer/bluesky_mqtt_producer_data"}
bluesky_mqtt_producer_mqtt_client = {path = "../bluesky_mqtt_producer/bluesky_mqtt_producer_mqtt_client"}

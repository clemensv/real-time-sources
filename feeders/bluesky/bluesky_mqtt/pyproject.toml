[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "bluesky-mqtt"
dynamic = [
    "version",
]
description = "Bluesky AT Protocol firehose -> MQTT/UNS non-retained bridge"
authors = [
    { name = "clemensv" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "bluesky_core",
    "aiohttp>=3.14.1",
    "atproto>=0.0.46",
    "azure-identity>=1.17.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "paho-mqtt>=2.1.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "bluesky_mqtt",
]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "billetto-amqp"
version = "0.1.0"
description = "billetto AMQP companion feeder"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
python-qpid-proton = ">=0.39.0"
azure-identity = ">=1.16.0"
billetto_amqp_producer_data = {path = "../billetto_amqp_producer/billetto_amqp_producer_data"}
billetto_amqp_producer_amqp_producer = {path = "../billetto_amqp_producer/billetto_amqp_producer_amqp_producer"}

[tool.poetry.scripts]
billetto-amqp = "billetto_amqp:main"

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "mode-s-kafka-bridge"
dynamic = [
    "version",
]
description = "Mode-S/ADS-B Bridge for BEAST messages (dump1090)"
authors = [
    { name = "Clemens Vasters" },
]
requires-python = "<4.0,>=3.10"
dependencies = [
    "mode_s_core",
    "aiohttp>=3.14.1",
    "asyncio>=3.4.3",
    "avro>=1.12.1,<2.0.0",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "pymodes>=2.19,<3",
    "requests>=2.34.2",
]

[project.scripts]
mode_s_kafka_bridge = "mode_s_kafka_bridge.mode_s:main"

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "mode_s_kafka_bridge",
]

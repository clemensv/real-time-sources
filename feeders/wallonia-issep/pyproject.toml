[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "wallonia-issep"
version = "0.1.0"
description = "Wallonia ISSeP air quality monitoring bridge to Kafka"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.34.2"
confluent-kafka = ">=2.14.2"
cloudevents = ">=1.12.1,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.12.1"
wallonia_issep_producer_data = {path = "wallonia_issep_producer/wallonia_issep_producer_data"}
wallonia_issep_producer_kafka_producer = {path = "wallonia_issep_producer/wallonia_issep_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=9.0.3"
pytest-cov = ">=7.1.0"
testcontainers = ">=4.14.2"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
wallonia-issep = "wallonia_issep:main"

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "waterinfo-vmm-amqp"
dynamic = [
    "version",
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "azure-identity>=1.17.0",
    "dataclasses_json>=0.6.7",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "waterinfo_vmm_amqp",
]

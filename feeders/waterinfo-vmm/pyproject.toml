[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "waterinfo-vmm"
version = "0.1.0"
description = "Belgian Waterinfo VMM (Flanders) bridge to Apache Kafka"
authors = ["Clemens Vasters"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.34.2"
urllib3 = ">=2.7.0"  # CVE pin (transitive via requests)
idna = ">=3.15"  # CVE pin (transitive via requests)
confluent-kafka = ">=2.14.2"
cloudevents = ">=1.12.1,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.12.1"
waterinfo_vmm_producer_data = {path = "waterinfo_vmm_producer/waterinfo_vmm_producer_data"}
waterinfo_vmm_producer_kafka_producer = {path = "waterinfo_vmm_producer/waterinfo_vmm_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=9.0.3"
pytest-cov = ">=7.1.0"
pytest-asyncio = ">=0.23.0"
testcontainers = ">=4.14.2"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
waterinfo-vmm = "waterinfo_vmm.waterinfo_vmm:main"

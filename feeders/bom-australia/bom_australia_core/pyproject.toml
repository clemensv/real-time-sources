[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "bom_australia_core"
dynamic = ["version"]
description = "BOM Australia transport-neutral acquisition, parsing and state core"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = ["cryptography>=48.0.1",
    "requests>=2.32.3",
    "urllib3>=2.7.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["bom_australia_core"]

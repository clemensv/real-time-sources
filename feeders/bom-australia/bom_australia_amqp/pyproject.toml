[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "bom_australia_amqp"
dynamic = ["version"]
description = "AMQP 1.0 companion feeder for bom-australia."
authors = [{ name = "Clemens Vasters", email = "clemensv@microsoft.com" }]
requires-python = ">=3.10,<4.0"
dependencies = [
    "python-qpid-proton>=0.39.0",
    "azure-identity>=1.16.0",
    "requests>=2.34.2",
    "dataclasses_json>=0.6.7",
    "bom_australia_core",
]

[project.scripts]
bom-australia-amqp = "bom_australia_amqp.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["bom_australia_amqp"]

[tool.uv.sources]
bom_australia_core = { path = "../bom_australia_core" }

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "uk-ea-flood-monitoring-mqtt"
version = "0.1.0"
packages = [{include = "uk_ea_flood_monitoring_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
uk_ea_flood_monitoring_mqtt_producer_data = {path = "../uk_ea_flood_monitoring_mqtt_producer/uk_ea_flood_monitoring_mqtt_producer_data"}
uk_ea_flood_monitoring_mqtt_producer_mqtt_client = {path = "../uk_ea_flood_monitoring_mqtt_producer/uk_ea_flood_monitoring_mqtt_producer_mqtt_client"}

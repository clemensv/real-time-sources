[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "nepal-bipad-hydrology"
version = "0.1.0"
description = "A bridge between the Nepal BIPAD Portal river monitoring API and Kafka endpoints"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
nepal_bipad_hydrology_producer_data = {path = "nepal_bipad_hydrology_producer/nepal_bipad_hydrology_producer_data"}
nepal_bipad_hydrology_producer_kafka_producer = {path = "nepal_bipad_hydrology_producer/nepal_bipad_hydrology_producer_kafka_producer"}


[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
pytest-cov = ">=5.0.0"
testcontainers = ">=4.8.1"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
nepal-bipad-hydrology = "nepal_bipad_hydrology:main"

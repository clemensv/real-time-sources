[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "nepal-bipad-hydrology-amqp-producer-amqp-producer"
dynamic = [
    "version",
]
description = "nepal_bipad_hydrology_amqp_producer_amqp_producer AMQP 1.0 producer library (Azure servicebus CBS/Entra ID enabled)"
authors = [
    { name = "Your Name", email = "your.email@example.com" },
]
requires-python = "<4.0,>=3.10"
dependencies = [
    "azure-core>=1.30.0",
    "azure-identity>=1.15.0",
    "cloudevents>=1.10.1,<2.0.0",
    "python-qpid-proton>=0.39.0",
]

[project.optional-dependencies]
dev = [
    "flake8>=7.1.0",
    "mypy>=1.10.0",
    "pylint>=3.2.3",
    "pytest-asyncio>=0.23.7",
    "pytest>=8.2.2",
    "testcontainers>=4.5.1",
]

[tool.setuptools_scm]
root = "../../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools.packages.find]
where = [
    "src",
]

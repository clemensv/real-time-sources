[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "snotel-mqtt"
version = "0.1.0"
packages = [{include = "snotel_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
snotel_mqtt_producer_data = {path = "../snotel_mqtt_producer/snotel_mqtt_producer_data"}
snotel_mqtt_producer_mqtt_client = {path = "../snotel_mqtt_producer/snotel_mqtt_producer_mqtt_client"}

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "fdsn_seismology_mqtt"
version = "0.1.0"
description = "MQTT feeder for federated FDSN earthquake event nodes."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "fdsn_seismology_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
fdsn_seismology_core = { path = "../fdsn_seismology_core" }
fdsn_seismology_mqtt_producer_data = { path = "../fdsn_seismology_mqtt_producer/fdsn_seismology_mqtt_producer_data" }
fdsn_seismology_mqtt_producer_mqtt_client = { path = "../fdsn_seismology_mqtt_producer/fdsn_seismology_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
fdsn-seismology-mqtt = "fdsn_seismology_mqtt.app:main"

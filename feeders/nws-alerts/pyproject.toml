[build-system]
requires = [
    "setuptools>=83.0.0",
    "setuptools-scm>=10.2.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "nws-alerts"
dynamic = [
    "version",
]
description = "NWS CAP weather alerts bridge"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "aiohttp>=3.14.1",
    "avro>=1.12.1",
    "cloudevents>=1.10.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses-json>=0.6.7",
    "nws_alerts_core",

]

[project.scripts]
nws-alerts = "nws_alerts.nws_alerts:main"

[project.optional-dependencies]
dev = [
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest>=9.1.1",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "nws_alerts",
]

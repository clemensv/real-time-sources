[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "nws-alerts-mqtt"
dynamic = [
    "version",
]
description = "NWS CAP weather alerts -> MQTT/UNS bridge"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "aiohttp>=3.14.1",
    "azure-identity>=1.17.0",
    "paho-mqtt>=2.1.0",
    "nws_alerts_core",

]

[project.scripts]
nws-alerts-mqtt = "nws_alerts_mqtt.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "nws_alerts_mqtt",
]

[tool.uv.sources]
nws_alerts_core = { path = "../nws_alerts_core" }

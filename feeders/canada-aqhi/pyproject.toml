[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "canada-aqhi"
dynamic = [
    "version",
]
description = "Bridge for Canada AQHI (Air Quality Health Index) to Kafka/CloudEvents"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.12.1,<3.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses_json>=0.6.7",
    "requests>=2.34.2",
]

[project.scripts]
canada-aqhi = "canada_aqhi:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
    "pytest>=9.0.3",
    "requests-mock>=1.12.1",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "canada_aqhi",
]

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "imgw-hydro"
dynamic = [
    "version",
]
description = "Polish Institute of Meteorology and Water Management (IMGW-PIB) Hydrology bridge to Apache Kafka"
authors = [
    { name = "Clemens Vasters" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses_json>=0.6.7",
    "requests>=2.34.2",
]

[project.scripts]
imgw-hydro = "imgw_hydro:main"

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "imgw_hydro",
]

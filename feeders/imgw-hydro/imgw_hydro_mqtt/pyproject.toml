[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "imgw-hydro-mqtt"
version = "0.1.0"
packages = [{include = "imgw_hydro_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
imgw_hydro_mqtt_producer_data = {path = "../imgw_hydro_mqtt_producer/imgw_hydro_mqtt_producer_data"}
imgw_hydro_mqtt_producer_mqtt_client = {path = "../imgw_hydro_mqtt_producer/imgw_hydro_mqtt_producer_mqtt_client"}

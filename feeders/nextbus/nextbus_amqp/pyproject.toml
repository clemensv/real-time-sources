[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nextbus-amqp"
version = "0.1.0"
description = "AMQP companion feeder for Nextbus"
requires-python = ">=3.10"
dependencies = ["python-qpid-proton>=0.40.0"]

[project.scripts]
nextbus-amqp = "nextbus_amqp.app:main"

[tool.setuptools.packages.find]
include = ["nextbus_amqp*"]

[build-system]
requires = [
    "setuptools>=83.0.0",
    "setuptools-scm>=10.2.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "nextbus"
dynamic = [
    "version",
]
description = "A project to fetch data from NextBus API"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "cloudevents>=1.10.1,<2.0.0",
    "requests>=2.34.2,<3.0.0",
    "nextbus_core",
]

[project.scripts]
nextbus = "nextbus:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.1.1",
    "requests-mock>=1.12.1",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "nextbus",
]

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "nextbus"
dynamic = [
    "version",
]
description = "A project to fetch data from NextBus API"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "azure-eventhub>=5.15.1,<6.0.0",
    "cloudevents>=2.2.0,<3.0.0",
    "requests>=2.34.2,<3.0.0",
]

[project.scripts]
nextbus = "nextbus:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "requests-mock>=1.12.1",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "nextbus",
]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "nasa-firms-mqtt"
version = "0.1.0"
description = "NASA FIRMS active-fire bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
nasa_firms_producer_data = {path = "../nasa_firms_producer/nasa_firms_producer_data"}
nasa_firms_mqtt_producer_data = {path = "../nasa_firms_mqtt_producer/nasa_firms_mqtt_producer_data"}
nasa_firms_mqtt_producer_mqtt_client = {path = "../nasa_firms_mqtt_producer/nasa_firms_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
nasa-firms-mqtt = "nasa_firms_mqtt:main"
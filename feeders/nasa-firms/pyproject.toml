[tool.poetry]
name = "nasa-firms"
description = "NASA FIRMS Active Fire Data Bridge (Kafka)"
authors = ["Clemens Vasters"]
readme = "README.md"
version = "0.1.0"

[tool.poetry.dependencies]
python = "<4.0,>=3.10"
confluent-kafka = ">=2.14.2"
cloudevents = ">=1.12.1,<2.0.0"
requests = ">=2.34.2"
aiohttp = ">=3.14.0"
asyncio = ">=3.4.3"
avro = "^1.12.1"
dataclasses-json = "^0.6.7"
nasa_firms_producer_data = {path = "nasa_firms_producer/nasa_firms_producer_data"}
nasa_firms_producer_kafka_producer = {path = "nasa_firms_producer/nasa_firms_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
flake8 = ">=7.1.1"
pylint = ">=3.2.7"
mypy = ">=1.11.2"
pytest-asyncio = ">=0.24.0"
pytest-cov = "^7.0.0"

[tool.poetry.scripts]
nasa-firms = "nasa_firms.nasa_firms:main"

[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "blitzortung"
version = "0.1.0"
description = "Blitzortung live lightning bridge to Kafka as CloudEvents"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
readme = "README.md"
packages = [{include = "blitzortung"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
websockets = ">=16.0"
confluent-kafka = ">=2.14.2"
cloudevents = ">=1.12.1,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.12.1"
blitzortung_producer_data = {path = "blitzortung_producer/blitzortung_producer_data"}
blitzortung_producer_kafka_producer = {path = "blitzortung_producer/blitzortung_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=9.0.3"
pytest-cov = ">=7.1.0"

[tool.poetry.scripts]
blitzortung = "blitzortung.blitzortung:main"

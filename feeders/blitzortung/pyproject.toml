[build-system]
requires = [
    "setuptools>=83.0.0",
    "setuptools-scm>=10.2.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "blitzortung"
dynamic = [
    "version",
]
description = "Blitzortung live lightning bridge to Kafka as CloudEvents"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "blitzortung_core",
    "avro>=1.12.1",
    "cloudevents>=1.10.1,<2.0.0",
    "confluent-kafka>=2.15.0",
    "dataclasses_json>=0.6.7",
    "websockets>=16.0",
]

[project.scripts]
blitzortung = "blitzortung.blitzortung:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
    "pytest>=9.1.1",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "blitzortung",
]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "blitzortung-amqp"
version = "0.1.0"
description = "AMQP 1.0 feeder for blitzortung"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "blitzortung_amqp" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
python-qpid-proton = ">=0.40.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
azure-core = ">=1.30.0"
blitzortung_amqp_producer_data = { path = "../blitzortung_amqp_producer/blitzortung_amqp_producer_data" }
blitzortung_amqp_producer_amqp_producer = { path = "../blitzortung_amqp_producer/blitzortung_amqp_producer_amqp_producer" }

[tool.poetry.scripts]
blitzortung-amqp = "blitzortung_amqp:main"

[project]
name = "dwd_pollenflug_mqtt"
version = "0.1.0"
description = "dwd-pollenflug MQTT companion feeder"
requires-python = ">=3.10"
dependencies = [
  "paho-mqtt>=2.1.0",
  "dwd_pollenflug_core",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["dwd_pollenflug_mqtt"]

[tool.uv.sources]
dwd_pollenflug_core = { path = "../dwd_pollenflug_core" }

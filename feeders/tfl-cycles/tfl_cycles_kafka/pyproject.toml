[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "tfl_cycles_kafka"
dynamic = [
    "version",
]
description = "Kafka feeder for TfL Santander Cycles (BikePoint)."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.11.3",
    "cloudevents>=1.10.1,<2.0.0",
    "confluent-kafka>=2.5.3",
    "dataclasses_json>=0.6.7",
]

[project.scripts]
tfl-cycles-kafka = "tfl_cycles.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "tfl_cycles",
]

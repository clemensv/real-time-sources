[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "pegelonline_amqp"
version = "0.1.0"
description = "AMQP 1.0 feeder for the WSV PegelOnline API (generic brokers + Azure Service Bus / Event Hubs with Entra)."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "pegelonline_amqp" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
python-qpid-proton = ">=0.40.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.12.1"
azure-identity = ">=1.17.0"
azure-core = ">=1.30.0"
pegelonline_core = { path = "../pegelonline_core" }
pegelonline_amqp_producer_data = { path = "../pegelonline_amqp_producer/pegelonline_amqp_producer_data" }
pegelonline_amqp_producer_amqp_producer = { path = "../pegelonline_amqp_producer/pegelonline_amqp_producer_amqp_producer" }

[tool.poetry.scripts]
pegelonline-amqp = "pegelonline_amqp.app:main"

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "german_waters_mqtt"
version = "0.1.0"
description = "MQTT/UNS feeder for the German Waters Hydrology aggregator (12 state flood portals)."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "german_waters_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.12.1"
requests = ">=2.32.3"
german_waters = { path = ".." }
german_waters_mqtt_producer_data = { path = "../german_waters_mqtt_producer/german_waters_mqtt_producer_data" }
german_waters_mqtt_producer_mqtt_client = { path = "../german_waters_mqtt_producer/german_waters_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
german-waters-mqtt = "german_waters_mqtt.app:main"

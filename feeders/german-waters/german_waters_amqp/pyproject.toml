[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "german_waters_amqp"
version = "0.1.0"
description = "AMQP 1.0 feeder for german-waters."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "german_waters_amqp" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
python-qpid-proton = ">=0.40.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.12.1"
azure-identity = ">=1.17.0"
azure-core = ">=1.30.0"
german_waters = { path = ".." }
german_waters_amqp_producer_data = { path = "../german_waters_amqp_producer/german_waters_amqp_producer_data" }
german_waters_amqp_producer_amqp_producer = { path = "../german_waters_amqp_producer/german_waters_amqp_producer_amqp_producer" }

[tool.poetry.scripts]
german-waters-amqp = "german_waters_amqp.app:main"

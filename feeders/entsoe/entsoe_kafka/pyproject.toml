[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "entsoe-kafka"
dynamic = [
    "version",
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "confluent-kafka>=2.5.3",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "entsoe_kafka",
]

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "entsoe-mqtt"
dynamic = [
    "version",
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "azure-identity>=1.17.0",
    "paho-mqtt>=2.1.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "entsoe_mqtt",
]

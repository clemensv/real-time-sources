[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gtfs-amqp"
version = "0.1.0"
description = "AMQP companion feeder for GTFS"
requires-python = ">=3.10"
dependencies = ["python-qpid-proton>=0.40.0"]

[project.scripts]
gtfs-amqp = "gtfs_amqp.app:main"

[tool.setuptools.packages.find]
include = ["gtfs_amqp*"]

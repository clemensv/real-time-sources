[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gtfs-amqp"
version = "0.1.0"
description = "AMQP companion feeder for GTFS"
requires-python = ">=3.10"
dependencies = [
    "cloudevents>=1.12.1,<2.0.0",
    "gtfs-amqp-producer-amqp-producer @ file:../gtfs_amqp_producer/gtfs_amqp_producer_amqp_producer",
    "gtfs-amqp-producer-data @ file:../gtfs_amqp_producer/gtfs_amqp_producer_data",
    "gtfs-core @ file:../gtfs_core",
    "python-qpid-proton>=0.40.0",
]

[project.scripts]
gtfs-amqp = "gtfs_amqp.app:main"

[tool.setuptools.packages.find]
include = ["gtfs_amqp*"]

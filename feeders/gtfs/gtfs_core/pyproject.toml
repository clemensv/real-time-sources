[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "gtfs-core"
dynamic = ["version"]
description = "Transport-agnostic acquisition for the GTFS bridge."
requires-python = ">=3.10,<4.0"
dependencies = [
    "cryptography>=48.0.1",
    "gtfs-rt-producer-data",
    "gtfs-realtime-bindings>=1.0.0",
    "requests>=2.34.2",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["gtfs_core"]
include-package-data = true

[tool.setuptools.package-data]
gtfs_core = ["sources/*.json"]

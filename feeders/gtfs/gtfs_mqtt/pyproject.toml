[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gtfs-mqtt"
version = "0.1.0"
description = "MQTT companion feeder for GTFS"
requires-python = ">=3.10"
dependencies = ["paho-mqtt>=2.1.0"]

[project.scripts]
gtfs-mqtt = "gtfs_mqtt.app:main"

[tool.setuptools.packages.find]
include = ["gtfs_mqtt*"]

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "hsl-hfp-amqp"
dynamic = [
    "version",
]
description = "HSL HFP AMQP 1.0 feeder — Helsinki Region Transport vehicle telemetry as AMQP CloudEvents (generic brokers + Azure Service Bus / Event Hubs with Entra)."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "azure-identity>=1.17.0",
    "cloudevents>=1.12.1,<2.0.0",
    "dataclasses_json>=0.6.7",
    "python-qpid-proton>=0.40.0",
]

[project.scripts]
hsl-hfp-amqp = "hsl_hfp_amqp.app:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "hsl_hfp_amqp",
]

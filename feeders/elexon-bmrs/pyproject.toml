[build-system]
requires = [
    "setuptools>=82.0.1",
    "setuptools-scm>=10.0.5",
]
build-backend = "setuptools.build_meta"

[project]
name = "elexon-bmrs"
dynamic = [
    "version",
]
description = "Elexon BMRS (GB Electricity Market) bridge to Apache Kafka"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1,<2.0.0",
    "cloudevents>=1.10.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses_json>=0.6.7",
    "requests>=2.34.2",
]

[project.scripts]
elexon-bmrs = "elexon_bmrs:main"

[project.optional-dependencies]
dev = [
    "pytest-cov>=7.1.0",
    "pytest>=9.1.1",
    "requests-mock>=1.12.1",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "elexon_bmrs",
]

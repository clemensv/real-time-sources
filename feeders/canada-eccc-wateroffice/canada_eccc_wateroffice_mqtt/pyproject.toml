[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "canada-eccc-wateroffice-mqtt"
version = "0.1.0"
packages = [{include = "canada_eccc_wateroffice_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
canada_eccc_wateroffice_mqtt_producer_data = {path = "../canada_eccc_wateroffice_mqtt_producer/canada_eccc_wateroffice_mqtt_producer_data"}
canada_eccc_wateroffice_mqtt_producer_mqtt_client = {path = "../canada_eccc_wateroffice_mqtt_producer/canada_eccc_wateroffice_mqtt_producer_mqtt_client"}

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "rssbridge-mqtt"
dynamic = [
    "version",
]
description = "RSS/Atom feed bridge to MQTT/UNS"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1,<2.0.0",
    "beautifulsoup4>=4.12.3",
    "soupsieve>=2.8.4",  # security pin (transitive via bs4): ReDoS/OOM in <=2.8.3
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "feedparser>=6.0.11",
    "listparser>=0.20",
    "paho-mqtt>=2.1.0",
    "requests>=2.32.3",
]

[project.scripts]
rssbridge-mqtt = "rssbridge_mqtt:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "rssbridge_mqtt",
]

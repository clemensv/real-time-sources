[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "aisstream_core"
dynamic = [
    "version",
]
description = "Transport-neutral acquisition and normalization for AISstream feeders."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "cryptography>=48.0.1",
    "websockets>=12.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "aisstream_core",
]

[tool.setuptools.package-data]
aisstream_core = ["mid_iso.csv"]

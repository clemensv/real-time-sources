[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "ireland-opw-waterlevel-amqp"
version = "0.1.0"
packages = [{include = "ireland_opw_waterlevel_amqp"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
azure-identity = ">=1.17.0"
dataclasses_json = ">=0.6.7"
ireland_opw_waterlevel_amqp_producer_data = {path = "../ireland_opw_waterlevel_amqp_producer/ireland_opw_waterlevel_amqp_producer_data"}
ireland_opw_waterlevel_amqp_producer_amqp_producer = {path = "../ireland_opw_waterlevel_amqp_producer/ireland_opw_waterlevel_amqp_producer_amqp_producer"}

[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "erddap_core"
dynamic = ["version"]
description = "ERDDAP feeder package"
authors = [{ name = "Clemens Vasters", email = "clemensv@microsoft.com" }]
requires-python = ">=3.10,<4.0"
dependencies = [
    "requests>=2.32.3",
    "urllib3>=2.2.1"
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "erddap_core"
]
include-package-data = true

[tool.setuptools.package-data]
erddap_core = ["sources/*.json"]

[build-system]
requires = [
    "setuptools>=82.0.1",
    "setuptools-scm>=10.2.0",
]
build-backend = "setuptools.build_meta"

[project]
name = "irail"
dynamic = [
    "version",
]
description = "iRail Belgian railway real-time bridge to Apache Kafka"
requires-python = ">=3.10,<4.0"
dependencies = [
    "irail_core",
    "avro>=1.12.1",
    "cloudevents>=1.10.1,<2.0.0",
    "confluent-kafka>=2.15.0",
    "dataclasses_json>=0.6.7",
    "requests>=2.34.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "irail",
]

[tool.poetry]
name = "hongkong-epd-producer-kafka-producer"
description = "hongkong_epd_producer_kafka_producer Kafka producer library"
authors = ["Your Name <your.email@example.com>"]
version = "0.1.0"  # Placeholder version, dynamic versioning can be handled with plugins
packages = [{include = "hongkong_epd_producer_kafka_producer", from = "src"}]

[tool.poetry.dependencies]
python = "<4.0,>=3.10"
hongkong-epd-producer-data = {path = "../hongkong_epd_producer_data", develop = true}
confluent-kafka = ">=2.4.0"
cloudevents = ">=1.10.1,<2.0.0"

[tool.poetry.dev-dependencies]
pytest = ">=8.2.2"
flake8 = ">=7.1.0"
pylint = ">=3.2.3"
mypy = ">=1.10.0"
testcontainers = ">=4.5.1"
pytest-asyncio = ">=0.23.7"

[tool.pytest.ini_options]
asyncio_mode = "strict"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
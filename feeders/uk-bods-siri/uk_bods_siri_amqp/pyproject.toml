[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "uk_bods_siri_amqp"
version = "0.1.0"
description = "AMQP feeder for the UK BODS SIRI-VM AVL archive."
authors = []
packages = [{ include = "uk_bods_siri_amqp" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
python-qpid-proton = ">=0.40.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
azure-core = ">=1.30.0"
uk_bods_siri_core = { path = "../uk_bods_siri_core" }
uk_bods_siri_amqp_producer_data = { path = "../uk_bods_siri_amqp_producer/uk_bods_siri_amqp_producer_data" }
uk_bods_siri_amqp_producer_amqp_producer = { path = "../uk_bods_siri_amqp_producer/uk_bods_siri_amqp_producer_amqp_producer" }

[tool.poetry.scripts]
uk-bods-siri-amqp = "uk_bods_siri_amqp.app:main"

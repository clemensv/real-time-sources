[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "uk_bods_siri_mqtt"
version = "0.1.0"
description = "MQTT feeder for the UK BODS SIRI-VM AVL archive."
authors = []
packages = [{ include = "uk_bods_siri_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
uk_bods_siri_core = { path = "../uk_bods_siri_core" }
uk_bods_siri_mqtt_producer_data = { path = "../uk_bods_siri_mqtt_producer/uk_bods_siri_mqtt_producer_data" }
uk_bods_siri_mqtt_producer_mqtt_client = { path = "../uk_bods_siri_mqtt_producer/uk_bods_siri_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
uk-bods-siri-mqtt = "uk_bods_siri_mqtt.app:main"

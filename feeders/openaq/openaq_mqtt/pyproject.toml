[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"
[tool.poetry]
name = "openaq-mqtt"
version = "0.1.0"
packages = [{include = "openaq_mqtt"}]
[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
openaq_mqtt_producer_data = "*"
openaq_mqtt_producer_mqtt_client = "*"

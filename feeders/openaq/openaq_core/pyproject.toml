[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "openaq_core"
dynamic = ["version"]
description = "Shared acquisition code for the OpenAQ feeder"
requires-python = ">=3.10,<4.0"
dependencies = ["cryptography>=48.0.1","requests>=2.32.3"]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["openaq_core", "openaq_core.sources"]
include-package-data = true

[tool.setuptools.package-data]
openaq_core = ["sources/*.json"]

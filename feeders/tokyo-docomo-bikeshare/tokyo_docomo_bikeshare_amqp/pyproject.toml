[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tokyo-docomo-bikeshare-amqp"
version = "0.1.0"
description = "AMQP companion feeder for Tokyo Docomo Bikeshare"
requires-python = ">=3.10"
dependencies = ["python-qpid-proton>=0.40.0"]

[project.scripts]
tokyo-docomo-bikeshare-amqp = "tokyo_docomo_bikeshare_amqp.app:main"

[tool.setuptools.packages.find]
include = ["tokyo_docomo_bikeshare_amqp*"]

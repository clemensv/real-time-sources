[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "french-road-traffic"
version = "0.1.0"
description = "French national road network real-time traffic data bridge (DATEX II) via Bison Futé"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "french_road_traffic" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
requests = ">=2.31.0"
dataclasses-json = ">=0.6.7"
avro = ">=1.12.1"
french_road_traffic_producer_data = { path = "french_road_traffic_producer/french_road_traffic_producer_data" }
french_road_traffic_producer_kafka_producer = { path = "french_road_traffic_producer/french_road_traffic_producer_kafka_producer" }

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
testcontainers = ">=4.8.1"

[tool.poetry.scripts]
french-road-traffic = "french_road_traffic:main"

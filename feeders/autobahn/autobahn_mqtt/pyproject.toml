[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "autobahn-mqtt"
dynamic = [
    "version",
]
description = "German Autobahn REST polling -> MQTT/UNS bridge"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "aiohttp>=3.10.5",
    "azure-identity>=1.17.0",
    "paho-mqtt>=2.1.0",
]

[project.scripts]
autobahn-mqtt = "autobahn_mqtt.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "autobahn_mqtt",
]

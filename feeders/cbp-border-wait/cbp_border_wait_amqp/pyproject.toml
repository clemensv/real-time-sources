[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "cbp_border_wait_amqp"
dynamic = [
    "version",
]
description = "AMQP 1.0 companion feeder for cbp-border-wait."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "azure-core>=1.30.0",
    "azure-identity>=1.17.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "python-qpid-proton>=0.40.0",
    "cbp_border_wait_core",

]

[project.scripts]
cbp-border-wait-amqp = "cbp_border_wait_amqp.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "cbp_border_wait_amqp",
]

[tool.uv.sources]
cbp_border_wait_core = { path = "../cbp_border_wait_core" }

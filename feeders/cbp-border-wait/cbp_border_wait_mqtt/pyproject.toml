[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "cbp-border-wait-mqtt"
dynamic = [
    "version",
]
description = "US CBP Border Wait Times MQTT/UNS bridge"
requires-python = ">=3.10,<4.0"
dependencies = [
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "paho-mqtt>=2.1.0",
    "requests>=2.32.3",
    "cbp_border_wait_core",

]

[project.scripts]
cbp-border-wait-mqtt = "cbp_border_wait_mqtt:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "cbp_border_wait_mqtt",
]

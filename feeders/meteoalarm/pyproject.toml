[build-system]
requires = [
    "setuptools>=82.0.1",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "meteoalarm"
dynamic = [
    "version",
]
description = "Meteoalarm European weather warnings bridge"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "aiohttp>=3.14.0",
    "avro>=1.12.1",
    "cloudevents>=1.10.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses-json>=0.6.7",
]

[project.scripts]
meteoalarm = "meteoalarm.meteoalarm:main"

[project.optional-dependencies]
dev = [
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "pytest>=9.1.1",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "meteoalarm",
]

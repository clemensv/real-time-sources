[project]
      name = "hko_hong_kong_amqp"
      version = "0.1.0"
      description = "hko-hong-kong AMQP companion feeder"
      requires-python = ">=3.10"
      dependencies = [
        "python-qpid-proton>=0.39.0",
"azure-identity>=1.16.0",
    "hko_hong_kong_core",
]

      [build-system]
      requires = ["setuptools>=68"]
      build-backend = "setuptools.build_meta"

      [tool.setuptools]
      packages = ["hko_hong_kong_amqp"]

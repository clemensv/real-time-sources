[project]
name = "hko_hong_kong_mqtt"
version = "0.1.0"
description = "hko-hong-kong MQTT companion feeder"
requires-python = ">=3.10"
dependencies = [
  "paho-mqtt>=2.1.0",
    "hko_hong_kong_core",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["hko_hong_kong_mqtt"]

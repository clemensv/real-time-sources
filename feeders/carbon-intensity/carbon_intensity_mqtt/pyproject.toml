[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "carbon-intensity-mqtt"
version = "0.1.0"
description = "Carbon Intensity UK bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
carbon_intensity_mqtt_producer_data = {path = "../carbon_intensity_mqtt_producer/carbon_intensity_mqtt_producer_data"}
carbon_intensity_mqtt_producer_mqtt_client = {path = "../carbon_intensity_mqtt_producer/carbon_intensity_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
carbon-intensity-mqtt = "carbon_intensity_mqtt:main"

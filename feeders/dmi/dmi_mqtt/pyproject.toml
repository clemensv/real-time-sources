[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "dmi_mqtt"
version = "0.1.0"
description = "MQTT/UNS feeder for the DMI observation triad (metObs + oceanObs)."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "dmi_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
dmi_core = { path = "../dmi_core" }
dmi_mqtt_producer_data = { path = "../dmi_mqtt_producer/dmi_mqtt_producer_data" }
dmi_mqtt_producer_mqtt_client = { path = "../dmi_mqtt_producer/dmi_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
dmi-mqtt = "dmi_mqtt.app:main"

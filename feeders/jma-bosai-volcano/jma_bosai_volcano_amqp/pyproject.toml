[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "jma-bosai-volcano-amqp"
dynamic = [
    "version",
]
description = "AMQP feeder for jma-bosai-volcano"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "jma_bosai_volcano_core",
    "python-qpid-proton>=0.40.0",
    "requests>=2.32.3",
]

[project.scripts]
jma-bosai-volcano-amqp = "jma_bosai_volcano_amqp.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "jma_bosai_volcano_amqp",
]

[tool.uv.sources]
jma_bosai_volcano_core = { path = "../jma_bosai_volcano_core" }

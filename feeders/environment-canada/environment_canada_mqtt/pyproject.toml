[project]
name = "environment_canada_mqtt"
version = "0.1.0"
description = "environment-canada MQTT companion feeder"
requires-python = ">=3.10"
dependencies = [
  "paho-mqtt>=2.1.0",
    "environment_canada_core",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["environment_canada_mqtt"]

[tool.uv.sources]
environment_canada_core = { path = "../environment_canada_core" }

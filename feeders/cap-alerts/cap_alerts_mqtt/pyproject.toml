[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "cap_alerts_mqtt"
dynamic = ["version"]
description = "CAP alerts MQTT feeder."
requires-python = ">=3.10,<4.0"
dependencies = ["requests>=2.32.3", "paho-mqtt>=2.1.0", "cloudevents>=1.11.0,<2.0.0", "dataclasses_json>=0.6.7", "azure-identity>=1.17.0", "avro>=1.11.3", "cap_alerts_core", "cap_alerts_mqtt_producer_data", "cap_alerts_mqtt_producer_mqtt_client"]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["cap_alerts_mqtt"]

[project]
name = "inpe-deter-brazil-mqtt"
version = "0.1.0"
description = "INPE DETER Brazil MQTT/UNS feeder"
requires-python = ">=3.10"
dependencies = [
    "aiohttp",
    "paho-mqtt",
    "dataclasses_json",
    "cloudevents",
    "inpe_deter_brazil_mqtt_producer_data",
    "inpe_deter_brazil_mqtt_producer_mqtt_client",
    "inpe-deter-brazil",
]

[project.scripts]
inpe-deter-brazil-mqtt = "inpe_deter_brazil_mqtt.app:main"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["inpe_deter_brazil_mqtt*"]

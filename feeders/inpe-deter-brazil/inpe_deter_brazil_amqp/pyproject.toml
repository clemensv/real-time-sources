[build-system]
requires=["poetry-core>=1.1.0"]
build-backend="poetry.core.masonry.api"
[tool.poetry]
name="inpe_deter_brazil-amqp"
version="0.1.0"
description="AMQP 1.0 feeder for inpe-deter-brazil"
authors=["Clemens Vasters <clemensv@microsoft.com>"]
packages=[{ include="inpe_deter_brazil_amqp" }]
[tool.poetry.dependencies]
python=">=3.10,<4.0"
python-qpid-proton=">=0.40.0"
cloudevents=">=1.11.0,<2.0.0"
dataclasses_json=">=0.6.7"
avro=">=1.12.1"
azure-identity=">=1.17.0"
azure-core=">=1.30.0"
inpe_deter_brazil_amqp_producer_data={ path="../inpe_deter_brazil_amqp_producer/inpe_deter_brazil_amqp_producer_data" }
inpe_deter_brazil_amqp_producer_amqp_producer={ path="../inpe_deter_brazil_amqp_producer/inpe_deter_brazil_amqp_producer_amqp_producer" }
[tool.poetry.scripts]
inpe-deter-brazil-amqp="inpe_deter_brazil_amqp:main"

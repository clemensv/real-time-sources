[build-system]
requires = ["setuptools>=64", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "datex2_amqp"
dynamic = ["version"]
requires-python = ">=3.10,<4.0"
dependencies = ["python-qpid-proton>=0.39.0", "azure-identity>=1.17.0", "datex2_core", "datex2_amqp_producer_data", "datex2_amqp_producer_amqp_producer"]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = ["datex2_amqp"]


[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8"
]
build-backend = "setuptools.build_meta"

[project]
name = "taipei_youbike_core"
dynamic = [
    "version"
]
description = "Transport-agnostic acquisition, normalization and config for the Taiwan YouBike 2.0 bridge."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" }
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "idna>=3.7",
    "requests>=2.32.3",
    "urllib3>=2.2.1"
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "taipei_youbike_core"
]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "bfs-odl"
version = "0.1.0"
description = "BfS ODL gamma dose rate monitoring bridge to Kafka"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.34.2"
confluent-kafka = ">=2.14.2"
cloudevents = ">=1.12.1,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.12.1"
bfs_odl_producer_data = {path = "bfs_odl_producer/bfs_odl_producer_data"}
bfs_odl_producer_kafka_producer = {path = "bfs_odl_producer/bfs_odl_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=9.0.3"
pytest-cov = ">=7.1.0"
testcontainers = ">=4.14.2"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
bfs-odl = "bfs_odl:main"

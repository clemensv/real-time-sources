[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "digitraffic-road"
dynamic = [
    "version",
]
description = "Finnish road traffic data bridge (sensors, traffic messages, maintenance tracking) via Digitraffic MQTT"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "digitraffic_road_core",
    "cloudevents>=1.12.1,<2.0.0",
    "confluent-kafka>=2.14.2",
    "dataclasses-json>=0.6.7",
    "paho-mqtt>=2.1.0",
    "requests>=2.31.0",
]

[project.scripts]
digitraffic-road = "digitraffic_road:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.3",
    "testcontainers>=4.14.2",
]

[tool.setuptools_scm]
root = "../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "digitraffic_road",
]

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "digitraffic_road_core"
dynamic = [
    "version",
]
description = "Transport-neutral acquisition for Digitraffic Road feeders."
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "paho-mqtt>=2.1.0",
    "requests>=2.31.0",
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "digitraffic_road_core",
]

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "digitraffic-road-amqp"
dynamic = [
    "version",
]
description = "Digitraffic Road -> AMQP 1.0 bridge for Finnish road traffic data"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "azure-core>=1.30.0",
    "azure-identity>=1.17.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses-json>=0.6.7",
    "paho-mqtt>=1.6.1",
    "python-qpid-proton>=0.40.0",
    "requests>=2.31.0",
]

[project.scripts]
digitraffic-road-amqp = "digitraffic_road_amqp.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "digitraffic_road_amqp",
]

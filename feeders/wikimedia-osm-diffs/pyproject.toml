[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "wikimedia-osm-diffs"
version = "0.1.0"
description = "OpenStreetMap Minutely Diffs bridge to Kafka as CloudEvents"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
readme = "README.md"
packages = [{include = "wikimedia_osm_diffs"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.31.0"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
wikimedia_osm_diffs_producer_data = {path = "wikimedia_osm_diffs_producer/wikimedia_osm_diffs_producer_data"}
wikimedia_osm_diffs_producer_kafka_producer = {path = "wikimedia_osm_diffs_producer/wikimedia_osm_diffs_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
pytest-cov = ">=5.0.0"

[tool.poetry.scripts]
wikimedia-osm-diffs = "wikimedia_osm_diffs.wikimedia_osm_diffs:main"

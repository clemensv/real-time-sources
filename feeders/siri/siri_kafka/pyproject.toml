[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "siri_kafka"
version = "0.1.0"
description = "Kafka feeder for generic SIRI VehicleMonitoring feeds."
authors = []
packages = [{ include = "siri_kafka" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
siri_core = { path = "../siri_core" }
siri_producer_data = { path = "../siri_producer/siri_producer_data" }
siri_producer_kafka_producer = { path = "../siri_producer/siri_producer_kafka_producer" }

[tool.poetry.scripts]
siri-kafka = "siri_kafka.app:main"

[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "siri_amqp"
dynamic = [
    "version",
]
description = "AMQP feeder for generic SIRI VehicleMonitoring feeds."
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.11.3",
    "azure-core>=1.30.0",
    "azure-identity>=1.17.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "python-qpid-proton>=0.40.0",
]

[project.scripts]
siri-amqp = "siri_amqp.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "siri_amqp",
]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "siri_amqp"
version = "0.1.0"
description = "AMQP feeder for generic SIRI VehicleMonitoring feeds."
authors = []
packages = [{ include = "siri_amqp" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
python-qpid-proton = ">=0.40.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
azure-core = ">=1.30.0"
siri_core = { path = "../siri_core" }
siri_amqp_producer_data = { path = "../siri_amqp_producer/siri_amqp_producer_data" }
siri_amqp_producer_amqp_producer = { path = "../siri_amqp_producer/siri_amqp_producer_amqp_producer" }

[tool.poetry.scripts]
siri-amqp = "siri_amqp.app:main"

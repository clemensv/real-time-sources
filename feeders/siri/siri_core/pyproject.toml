[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8"
]
build-backend = "setuptools.build_meta"

[project]
name = "siri_core"
dynamic = [
    "version"
]
description = "Transport-agnostic acquisition and config for the generic SIRI feeder."
requires-python = ">=3.10,<4.0"
dependencies = [
    "requests>=2.32.3",
    "urllib3>=2.2.2"
]

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "siri_core"
]
include-package-data = true

[tool.setuptools.package-data]
siri_core = [
    "sources/*.json"
]

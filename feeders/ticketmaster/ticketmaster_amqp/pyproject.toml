[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "ticketmaster-amqp"
dynamic = [
    "version",
]
description = "ticketmaster AMQP companion feeder"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "azure-identity>=1.16.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "python-qpid-proton>=0.39.0",
]

[project.scripts]
ticketmaster-amqp = "ticketmaster_amqp:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "ticketmaster_amqp",
]

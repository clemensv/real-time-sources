[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "seattle-911"
version = "0.1.0"
description = "Seattle Fire 911 bridge to Apache Kafka"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.34.2"
confluent-kafka = ">=2.14.2"
cloudevents = ">=1.12.1,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = "^1.12.1"
seattle_911_producer_data = {path = "seattle_911_producer/seattle_911_producer_data"}
seattle_911_producer_kafka_producer = {path = "seattle_911_producer/seattle_911_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=9.0.3"
pytest-cov = ">=7.1.0"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
seattle-911 = "seattle_911:main"

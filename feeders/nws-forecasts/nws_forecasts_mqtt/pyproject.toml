[build-system]
requires = [
    "setuptools>=64",
    "setuptools-scm>=8",
]
build-backend = "setuptools.build_meta"

[project]
name = "nws-forecasts-mqtt"
dynamic = [
    "version",
]
description = "MQTT feeder for nws-forecasts"
authors = [
    { name = "Clemens Vasters", email = "clemensv@microsoft.com" },
]
requires-python = ">=3.10,<4.0"
dependencies = [
    "avro>=1.12.1",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "paho-mqtt>=2.1.0",
    "nws_forecasts_core",
]

[project.scripts]
nws-forecasts-mqtt = "nws_forecasts_mqtt.app:main"

[tool.setuptools_scm]
root = "../../.."
version_scheme = "post-release"
local_scheme = "no-local-version"

[tool.setuptools]
packages = [
    "nws_forecasts_mqtt",
]

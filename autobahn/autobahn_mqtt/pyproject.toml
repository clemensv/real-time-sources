[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "autobahn-mqtt"
version = "0.1.0"
description = "German Autobahn REST polling -> MQTT/UNS bridge"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "autobahn_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
paho-mqtt = ">=2.1.0"
azure-identity = ">=1.17.0"
autobahn = { path = ".." }
autobahn_mqtt_producer_data = { path = "../autobahn_mqtt_producer/autobahn_mqtt_producer_data" }
autobahn_mqtt_producer_mqtt_client = { path = "../autobahn_mqtt_producer/autobahn_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
autobahn-mqtt = "autobahn_mqtt.app:main"

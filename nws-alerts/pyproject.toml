[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "nws-alerts"
version = "0.1.0"
description = "NWS CAP weather alerts bridge"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "nws_alerts" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
avro = ">=1.12.1"
cloudevents = ">=1.11.0,<2.0.0"
confluent-kafka = ">=2.5.3"
dataclasses-json = ">=0.6.7"
nws_alerts_producer_data = { path = "nws_alerts_producer/nws_alerts_producer_data" }
nws_alerts_producer_kafka_producer = { path = "nws_alerts_producer/nws_alerts_producer_kafka_producer" }

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
pytest-asyncio = ">=0.24.0"
pytest-cov = ">=7.0.0"

[tool.poetry.scripts]
nws-alerts = "nws_alerts.nws_alerts:main"

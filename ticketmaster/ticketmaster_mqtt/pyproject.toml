[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "ticketmaster-mqtt"
version = "0.1.0"
description = "ticketmaster MQTT companion feeder"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
ticketmaster_mqtt_producer_data = {path = "../ticketmaster_mqtt_producer/ticketmaster_mqtt_producer_data"}
ticketmaster_mqtt_producer_mqtt_client = {path = "../ticketmaster_mqtt_producer/ticketmaster_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
ticketmaster-mqtt = "ticketmaster_mqtt:main"

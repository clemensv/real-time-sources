[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "chmi_hydro_mqtt"
version = "0.1.0"
description = "MQTT/UNS feeder for the Czech Hydrometeorological Institute (CHMI) Hydrology HYDRO web service."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "chmi_hydro_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
requests = ">=2.32.3"
chmi_hydro = { path = ".." }
chmi_hydro_mqtt_producer_data = { path = "../chmi_hydro_mqtt_producer/chmi_hydro_mqtt_producer_data" }
chmi_hydro_mqtt_producer_mqtt_client = { path = "../chmi_hydro_mqtt_producer/chmi_hydro_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
chmi-hydro-mqtt = "chmi_hydro_mqtt.app:main"

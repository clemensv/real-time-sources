[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "smhi_hydro"
version = "0.1.0"
requires-python = ">=3.9"
dependencies = [
    "confluent_kafka",
    "cloudevents",
    "requests",
    "dataclasses-json",
]

[project.scripts]
smhi_hydro = "smhi_hydro:main"

[tool.setuptools.packages.find]
include = ["smhi_hydro*"]

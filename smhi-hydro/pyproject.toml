[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "smhi-hydro"
version = "0.1.0"
description = "Swedish Meteorological and Hydrological Institute (SMHI) Hydrology bridge to Apache Kafka"
authors = ["Clemens Vasters"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
smhi_hydro_producer_data = {path = "smhi_hydro_producer/smhi_hydro_producer_data"}
smhi_hydro_producer_kafka_producer = {path = "smhi_hydro_producer/smhi_hydro_producer_kafka_producer"}

[tool.poetry.scripts]
smhi-hydro = "smhi_hydro:main"

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "rws-waterwebservices"
version = "0.1.0"
description = "Dutch Rijkswaterstaat Waterwebservices bridge to Apache Kafka"
authors = ["Clemens Vasters"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
rws_waterwebservices_producer_data = {path = "rws_waterwebservices_producer/rws_waterwebservices_producer_data"}
rws_waterwebservices_producer_kafka_producer = {path = "rws_waterwebservices_producer/rws_waterwebservices_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
pytest-cov = ">=5.0.0"
pytest-asyncio = ">=0.23.0"
testcontainers = ">=4.8.1"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
rws-waterwebservices = "rws_waterwebservices.rws_waterwebservices:main"

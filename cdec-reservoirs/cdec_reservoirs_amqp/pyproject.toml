[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "cdec-reservoirs-amqp"
version = "0.1.0"
packages = [{include = "cdec_reservoirs_amqp"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
azure-identity = ">=1.17.0"
dataclasses_json = ">=0.6.7"
cdec_reservoirs_amqp_producer_data = {path = "../cdec_reservoirs_amqp_producer/cdec_reservoirs_amqp_producer_data"}
cdec_reservoirs_amqp_producer_amqp_producer = {path = "../cdec_reservoirs_amqp_producer/cdec_reservoirs_amqp_producer_amqp_producer"}

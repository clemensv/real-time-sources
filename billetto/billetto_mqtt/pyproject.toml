[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "billetto-mqtt"
version = "0.1.0"
description = "billetto MQTT companion feeder"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
billetto_mqtt_producer_data = {path = "../billetto_mqtt_producer/billetto_mqtt_producer_data"}
billetto_mqtt_producer_mqtt_client = {path = "../billetto_mqtt_producer/billetto_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
billetto-mqtt = "billetto_mqtt:main"

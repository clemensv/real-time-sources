[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "blitzortung-mqtt"
version = "0.1.0"
description = "Blitzortung lightning firehose -> MQTT/UNS non-retained bridge"
authors = ["clemensv"]
packages = [{include = "blitzortung_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
websockets = ">=12.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
blitzortung_mqtt_producer_data = {path = "../blitzortung_mqtt_producer/blitzortung_mqtt_producer_data"}
blitzortung_mqtt_producer_mqtt_client = {path = "../blitzortung_mqtt_producer/blitzortung_mqtt_producer_mqtt_client"}

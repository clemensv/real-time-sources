[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "noaa_swpc_l1_mqtt"
version = "0.1.0"
description = "MQTT/UNS feeder for the NOAA SWPC L1 propagated solar wind product."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "noaa_swpc_l1_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
azure-identity = ">=1.17.0"
noaa_swpc_l1_core = { path = "../noaa_swpc_l1_core" }
noaa_swpc_l1_mqtt_producer_data = { path = "../noaa_swpc_l1_mqtt_producer/noaa_swpc_l1_mqtt_producer_data" }
noaa_swpc_l1_mqtt_producer_mqtt_client = { path = "../noaa_swpc_l1_mqtt_producer/noaa_swpc_l1_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
noaa-swpc-l1-mqtt = "noaa_swpc_l1_mqtt.app:main"

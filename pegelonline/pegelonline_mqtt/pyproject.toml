[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "pegelonline_mqtt"
version = "0.1.0"
description = "MQTT/UNS feeder for the WSV PegelOnline API."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "pegelonline_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
pegelonline_core = { path = "../pegelonline_core" }
pegelonline_mqtt_producer_data = { path = "../pegelonline_mqtt_producer/pegelonline_mqtt_producer_data" }
pegelonline_mqtt_producer_mqtt_client = { path = "../pegelonline_mqtt_producer/pegelonline_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
pegelonline-mqtt = "pegelonline_mqtt.app:main"

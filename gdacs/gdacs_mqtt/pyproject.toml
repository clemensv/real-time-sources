[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "gdacs-mqtt"
version = "0.1.0"
description = "GDACS bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
gdacs_producer_data = {path = "../gdacs_producer/gdacs_producer_data"}
gdacs_mqtt_producer_data = {path = "../gdacs_mqtt_producer/gdacs_mqtt_producer_data"}
gdacs_mqtt_producer_mqtt_client = {path = "../gdacs_mqtt_producer/gdacs_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
gdacs-mqtt = "gdacs_mqtt:main"

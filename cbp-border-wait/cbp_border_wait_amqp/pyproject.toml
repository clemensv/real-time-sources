[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "cbp_border_wait_amqp"
version = "0.1.0"
description = "AMQP 1.0 companion feeder for cbp-border-wait."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "cbp_border_wait_amqp" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
python-qpid-proton = ">=0.40.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
azure-core = ">=1.30.0"
cbp_border_wait_amqp_producer_data = { path = "../cbp_border_wait_amqp_producer/cbp_border_wait_amqp_producer_data" }
cbp_border_wait_amqp_producer_amqp_producer = { path = "../cbp_border_wait_amqp_producer/cbp_border_wait_amqp_producer_amqp_producer" }

[tool.poetry.scripts]
cbp-border-wait-amqp = "cbp_border_wait_amqp.app:main"

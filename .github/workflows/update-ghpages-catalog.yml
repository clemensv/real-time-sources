name: Update ghpages catalog

on:
  push:
    branches: [ main ]
    paths:
      - catalog.json
      - app.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          path: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout ghpages
        uses: actions/checkout@v6
        with:
          ref: ghpages
          path: ghpages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync app.js and catalog.json from main
        run: |
          cp main/app.js ghpages/app.js
          cp main/catalog.json ghpages/catalog.json

      - name: Check for changes
        id: diff
        working-directory: ghpages
        run: |
          if git diff --quiet -- app.js catalog.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.diff.outputs.changed == 'true'
        working-directory: ghpages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js catalog.json
          git commit -m "Sync catalog from main"
          git push origin ghpages

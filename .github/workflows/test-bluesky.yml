name: Bluesky Firehose Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'feeders/bluesky/**'
      - '.github/workflows/test-bluesky.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'feeders/bluesky/**'
      - '.github/workflows/test-bluesky.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./feeders/bluesky
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/test_bluesky_unit.py -v --tb=short

      - name: Run integration tests (excluding external services)
        run: pytest tests/test_bluesky_integration.py -v --tb=short -m "not integration"

      - name: Run all tests with coverage (excluding external services)
        run: pytest tests/ -v --cov=bluesky --cov-report=term-missing --cov-report=xml --cov-fail-under=20 -m "not integration"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: always()
        with:
          file: ./feeders/bluesky/coverage.xml
          flags: bluesky
          name: bluesky-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

name: GTFS Bridge Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'feeders/gtfs/**'
      - '.github/workflows/test-gtfs.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'feeders/gtfs/**'
      - '.github/workflows/test-gtfs.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./feeders/gtfs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run unit tests
        run: pytest tests/test_gtfs_bridge_unit.py -v --tb=short

      - name: Run integration tests
        run: pytest tests/test_gtfs_bridge_integration.py -v --tb=short

      - name: Run all tests with coverage
        run: pytest tests/ -v --cov=gtfs_rt_bridge --cov-report=term-missing --cov-report=xml --cov-fail-under=20

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: always()
        with:
          file: ./feeders/gtfs/coverage.xml
          flags: gtfs
          name: gtfs-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

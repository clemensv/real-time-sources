name: _docker-flow-shard

# Reusable workflow: runs the Kafka flow E2E tests for one shard of the Docker
# E2E flow matrix. Called once per shard by test-docker-e2e.yml so the combined
# matrix can exceed GitHub Actions' 256-job-per-matrix limit. An empty shard
# (the `{include: []}` shape) skips via the job-level `if` guard.

on:
  workflow_call:
    inputs:
      matrix:
        description: JSON matrix ({include:[...]}) for this flow shard.
        required: true
        type: string
    secrets:
      WSDOT_ACCESS_CODE:
        required: false

jobs:
  flow:
    name: Docker Kafka Flow
    if: ${{ inputs.matrix != '' && fromJson(inputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(inputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Seed broker + base images from GHCR mirror
        uses: ./.github/actions/seed-images
        with:
          # Seed the base images every job needs plus only this job's broker
          # (kafka for the default/Kafka flow, otherwise mqtt or amqp).
          categories: base ${{ contains(matrix.test_file, 'mqtt') && 'mqtt' || contains(matrix.test_file, 'amqp') && 'amqp' || 'kafka' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          pip install -r tests/docker_e2e/requirements.txt
          pip install pytest-rerunfailures

      - name: Run Kafka flow test
        run: |
          # Bounded retry absorbs transient live-upstream flakes (an upstream
          # that simply did not emit within the window under runner load).
          # Deterministic contract failures (wrong key/subject, invalid schema,
          # missing event types) fail identically on every attempt, so they are
          # not masked. The weekly scheduled full run is the authoritative gate.
          pytest tests/docker_e2e/${{ matrix.test_file || 'test_docker_kafka_flow.py' }} \
            -v --timeout=1200 \
            --reruns 2 --reruns-delay 15 \
            -k "${{ matrix.test_class }}" \
            --tb=long
        timeout-minutes: 45
        env:
          WSDOT_ACCESS_CODE: ${{ secrets.WSDOT_ACCESS_CODE }}
          # CI containers are ephemeral; skip the Ryuk reaper and its Hub pull.
          # The Kafka broker itself is seeded from the GHCR mirror above and
          # retagged to its canonical name, so testcontainers resolves it from
          # the local cache; a mirror miss falls back to Docker Hub.
          TESTCONTAINERS_RYUK_DISABLED: "true"

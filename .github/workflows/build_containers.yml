name: Build Containers

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Push images to ghcr.io even on non-default branches'
        type: boolean
        required: false
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  find-dockerfiles:
    runs-on: ubuntu-latest
    outputs:
      containers: ${{ steps.get-dockerfiles.outputs.containers }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Find all container projects
        id: get-dockerfiles
        run: |
          # Discover Dockerfile and Dockerfile.<variant> across the repo.
          # The image suffix for a plain Dockerfile is its directory name with
          # slashes replaced by dashes; for a Dockerfile.<variant> we append
          # "-<variant>" so each transport variant publishes its own image.
          CONTAINERS_JSON=$(find . \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) -type f \
            | sed 's|^\./||' \
            | sort \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(
                    capture("^(?<path>.*)/(?<file>Dockerfile(?<variant>\\..+)?)$")
                    | . + {
                        image: (
                          (.path | gsub("/"; "-"))
                          + (if .variant then (.variant | gsub("^\\."; "-")) else "" end)
                        )
                      }
                  )')
          echo "containers=${CONTAINERS_JSON}" >> $GITHUB_OUTPUT

  build:
    needs: find-dockerfiles
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        container: ${{ fromJson(needs.find-dockerfiles.outputs.containers) }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.container.image }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      
      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./${{ matrix.container.path }}
          file: ./${{ matrix.container.path }}/${{ matrix.container.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          COSIGN_DOCKER_MEDIA_TYPES: "1"
          COSIGN_REGISTRY_USERNAME: ${{ github.actor }}
          COSIGN_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance. Retries absorb
        # transient ghcr.io BLOB_UNKNOWN / DENIED races right after push.
        run: |
          set -u
          sign_one() {
            local ref="$1"
            local attempt=1
            local max=5
            local delay=6
            while [ "$attempt" -le "$max" ]; do
              echo "cosign sign attempt $attempt/$max for $ref"
              if cosign sign --yes \
                  --registry-username "${COSIGN_REGISTRY_USERNAME}" \
                  --registry-password "${COSIGN_REGISTRY_PASSWORD}" \
                  "$ref"; then
                return 0
              fi
              echo "cosign sign failed (attempt $attempt); sleeping ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
            done
            echo "::error::cosign sign failed for $ref after $max attempts"
            return 1
          }
          rc=0
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            sign_one "${tag}@${DIGEST}" || rc=1
          done <<< "${TAGS}"
          exit "$rc"

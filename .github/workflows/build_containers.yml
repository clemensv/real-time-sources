name: Build Containers

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Push images to ghcr.io even on non-default branches'
        type: boolean
        required: false
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  find-dockerfiles:
    runs-on: ubuntu-latest
    outputs:
      containers_base: ${{ steps.scope.outputs.containers_base }}
      containers_transport: ${{ steps.scope.outputs.containers_transport }}
      full_run: ${{ steps.scope.outputs.full_run }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find all container projects
        id: get-dockerfiles
        run: |
          # Discover Dockerfile and Dockerfile.<variant> across the repo.
          # The image suffix for a plain Dockerfile is its directory name with
          # slashes replaced by dashes; for a Dockerfile.<variant> we append
          # "-<variant>" so each transport variant publishes its own image.
          # Split into two lists to stay under GitHub's 256-config matrix limit:
          #   containers_base      – plain Dockerfile only (~102)
          #   containers_transport – Dockerfile.<variant>  (~213)
          ALL_JSON=$(find . \( -name 'Dockerfile' -o -name 'Dockerfile.*' \) -type f \
            | sed 's|^\./||' \
            | sort \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(
                    capture("^(?<path>.*)/(?<file>Dockerfile(?<variant>\\..+)?)$")
                    | . + {
                        image: (
                          (.path | sub("^feeders/"; "") | gsub("/"; "-"))
                          + (if .variant then (.variant | gsub("^\\."; "-")) else "" end)
                        )
                      }
                  )')
          BASE_JSON=$(echo "$ALL_JSON" | jq -c '[.[] | select(.variant == null or .variant == "")]')
          TRANSPORT_JSON=$(echo "$ALL_JSON" | jq -c '[.[] | select(.variant != null and .variant != "")]')
          echo "all_base<<EOF_BASE" >> $GITHUB_OUTPUT
          echo "$BASE_JSON" >> $GITHUB_OUTPUT
          echo "EOF_BASE" >> $GITHUB_OUTPUT
          echo "all_transport<<EOF_TRANSPORT" >> $GITHUB_OUTPUT
          echo "$TRANSPORT_JSON" >> $GITHUB_OUTPUT
          echo "EOF_TRANSPORT" >> $GITHUB_OUTPUT

      - name: Collect changed files
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$PR_BASE_SHA" --depth=1 || true
            git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA" > changed-files.txt
          elif [ "$EVENT_NAME" = "push" ] && [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" > changed-files.txt
          else
            : > changed-files.txt
          fi
          echo "[changed] $(wc -l < changed-files.txt) file(s):"
          head -50 changed-files.txt || true

      - name: Scope container matrix
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          CHANGED_FILES_PATH: changed-files.txt
          ALL_BASE_JSON: ${{ steps.get-dockerfiles.outputs.all_base }}
          ALL_TRANSPORT_JSON: ${{ steps.get-dockerfiles.outputs.all_transport }}
        run: python3 tools/ci/discover_container_matrix.py

  build-base:
    needs: find-dockerfiles
    if: ${{ needs.find-dockerfiles.outputs.containers_base != '' && needs.find-dockerfiles.outputs.containers_base != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        container: ${{ fromJson(needs.find-dockerfiles.outputs.containers_base) }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure Docker Hub mirror
        run: |
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors":["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl reload docker

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.container.image }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./${{ matrix.container.path }}
          file: ./${{ matrix.container.path }}/${{ matrix.container.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          COSIGN_DOCKER_MEDIA_TYPES: "1"
          COSIGN_REGISTRY_USERNAME: ${{ github.actor }}
          COSIGN_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -u
          sign_one() {
            local ref="$1"
            local attempt=1
            local max=5
            local delay=6
            while [ "$attempt" -le "$max" ]; do
              echo "cosign sign attempt $attempt/$max for $ref"
              if cosign sign --yes \
                  --registry-username "${COSIGN_REGISTRY_USERNAME}" \
                  --registry-password "${COSIGN_REGISTRY_PASSWORD}" \
                  "$ref"; then
                return 0
              fi
              echo "cosign sign failed (attempt $attempt); sleeping ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
            done
            echo "::error::cosign sign failed for $ref after $max attempts"
            return 1
          }
          rc=0
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            sign_one "${tag}@${DIGEST}" || rc=1
          done <<< "${TAGS}"
          exit "$rc"

  build-transport:
    needs: find-dockerfiles
    if: ${{ needs.find-dockerfiles.outputs.containers_transport != '' && needs.find-dockerfiles.outputs.containers_transport != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        container: ${{ fromJson(needs.find-dockerfiles.outputs.containers_transport) }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure Docker Hub mirror
        run: |
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors":["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl reload docker

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.container.image }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./${{ matrix.container.path }}
          file: ./${{ matrix.container.path }}/${{ matrix.container.file }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          COSIGN_DOCKER_MEDIA_TYPES: "1"
          COSIGN_REGISTRY_USERNAME: ${{ github.actor }}
          COSIGN_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -u
          sign_one() {
            local ref="$1"
            local attempt=1
            local max=5
            local delay=6
            while [ "$attempt" -le "$max" ]; do
              echo "cosign sign attempt $attempt/$max for $ref"
              if cosign sign --yes \
                  --registry-username "${COSIGN_REGISTRY_USERNAME}" \
                  --registry-password "${COSIGN_REGISTRY_PASSWORD}" \
                  "$ref"; then
                return 0
              fi
              echo "cosign sign failed (attempt $attempt); sleeping ${delay}s"
              sleep "$delay"
              attempt=$((attempt + 1))
            done
            echo "::error::cosign sign failed for $ref after $max attempts"
            return 1
          }
          rc=0
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            sign_one "${tag}@${DIGEST}" || rc=1
          done <<< "${TAGS}"
          exit "$rc"

name: NOAA Producer Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'feeders/noaa/**'
      - '.github/workflows/test-noaa.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'feeders/noaa/**'
      - '.github/workflows/test-noaa.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./feeders/noaa
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package with dev extras
        run: pip install --quiet -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/test_noaa_unit.py -v --tb=short

      - name: Run integration tests
        run: pytest tests/test_noaa_integration.py -v --tb=short

      - name: Run all tests with coverage (excluding e2e)
        run: pytest tests/ -v --cov=noaa --cov-report=term-missing --cov-report=xml --cov-fail-under=20 -m "not e2e"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: always()
        with:
          file: ./feeders/noaa/coverage.xml
          flags: noaa
          name: noaa-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

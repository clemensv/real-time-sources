name: Docker E2E Tests

# Strategy: a `discover` job inspects the changed files and decides which
# feeders to build + test. If only one feeder's files changed, only that
# feeder's docker-build + docker-kafka-flow jobs run. If any infrastructure
# path changed (tests/docker_e2e/**, this workflow, tools/**, catalog.json)
# the full matrix runs. workflow_dispatch / schedule also force full.
#
# The authoritative feeder list lives in tests/docker_e2e/matrix.json so
# adding a feeder is a JSON edit, not a YAML edit.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  discover:
    name: Discover affected feeders
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.compute.outputs.build_matrix }}
      flow_matrix: ${{ steps.compute.outputs.flow_matrix }}
      full_run: ${{ steps.compute.outputs.full_run }}
      reason: ${{ steps.compute.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$PR_BASE_SHA" --depth=1 || true
            files=$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")
          elif [ "$EVENT_NAME" = "push" ] && [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            files=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")
          else
            files=""
          fi
          {
            echo "files<<EOF_FILES"
            echo "$files"
            echo "EOF_FILES"
          } >> "$GITHUB_OUTPUT"
          echo "[changed] $(echo "$files" | wc -l) file(s):"
          echo "$files" | head -50

      - name: Compute filtered matrix
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: python tests/docker_e2e/discover_matrix.py

  docker-build:
    name: Docker Build & Import
    needs: discover
    if: ${{ needs.discover.outputs.build_matrix != '' && fromJson(needs.discover.outputs.build_matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.build_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: |
          docker build -t test-${{ matrix.dir }} ./${{ matrix.dir }}

      - name: Verify module imports
        run: |
          docker run --rm test-${{ matrix.dir }} \
            python -c "import ${{ matrix.module }}; print('OK')"

  docker-kafka-flow:
    name: Docker Kafka Flow
    needs: [discover, docker-build]
    if: ${{ always() && needs.docker-build.result != 'failure' && needs.discover.outputs.flow_matrix != '' && fromJson(needs.discover.outputs.flow_matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.flow_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install -r tests/docker_e2e/requirements.txt

      - name: Build Docker image
        run: |
          docker build -t test-${{ matrix.dir }} ./${{ matrix.dir }}

      - name: Run Kafka flow test
        run: |
          pytest tests/docker_e2e/test_docker_kafka_flow.py \
            -v --timeout=300 \
            -k "${{ matrix.test_class }}" \
            --tb=long
        timeout-minutes: 10
        env:
          WSDOT_ACCESS_CODE: ${{ secrets.WSDOT_ACCESS_CODE }}

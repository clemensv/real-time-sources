name: Docker E2E Tests

# Strategy: a `discover` job inspects the changed files and decides which
# feeders to build + test. If only one feeder's files changed, only that
# feeder's docker-build + docker-kafka-flow jobs run. If any infrastructure
# path changed (tests/docker_e2e/**, this workflow, tools/**, catalog.json)
# the full matrix runs. workflow_dispatch / schedule also force full.
#
# The authoritative feeder list lives in tests/docker_e2e/matrix.json so
# adding a feeder is a JSON edit, not a YAML edit.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  discover:
    name: Discover affected feeders
    runs-on: ubuntu-latest
    outputs:
      build_matrix_0: ${{ steps.compute.outputs.build_matrix_0 }}
      build_matrix_1: ${{ steps.compute.outputs.build_matrix_1 }}
      build_matrix_2: ${{ steps.compute.outputs.build_matrix_2 }}
      build_matrix_3: ${{ steps.compute.outputs.build_matrix_3 }}
      flow_matrix_0: ${{ steps.compute.outputs.flow_matrix_0 }}
      flow_matrix_1: ${{ steps.compute.outputs.flow_matrix_1 }}
      flow_matrix_2: ${{ steps.compute.outputs.flow_matrix_2 }}
      flow_matrix_3: ${{ steps.compute.outputs.flow_matrix_3 }}
      full_run: ${{ steps.compute.outputs.full_run }}
      reason: ${{ steps.compute.outputs.reason }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$PR_BASE_SHA" --depth=1 || true
            git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA" > changed-files.txt
          elif [ "$EVENT_NAME" = "push" ] && [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" > changed-files.txt
          else
            : > changed-files.txt
          fi
          echo "[changed] $(wc -l < changed-files.txt) file(s):"
          head -50 changed-files.txt || true

      - name: Compute filtered matrix
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGED_FILES_PATH: changed-files.txt
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.after }}
        run: python tests/docker_e2e/discover_matrix.py

  docker-build:
    name: Build shard ${{ matrix.shard }}
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    uses: ./.github/workflows/_docker-build-shard.yml
    with:
      matrix: ${{ needs.discover.outputs[format('build_matrix_{0}', matrix.shard)] }}

  docker-kafka-flow:
    name: Flow shard ${{ matrix.shard }}
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    uses: ./.github/workflows/_docker-flow-shard.yml
    with:
      matrix: ${{ needs.discover.outputs[format('flow_matrix_{0}', matrix.shard)] }}
    secrets: inherit

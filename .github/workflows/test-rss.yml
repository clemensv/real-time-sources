name: RSS Bridge Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'feeders/rss/**'
      - '.github/workflows/test-rss.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'feeders/rss/**'
      - '.github/workflows/test-rss.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./feeders/rss
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install generated producer packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./rssbridge_producer/rssbridge_producer_data
          python -m pip install -e ./rssbridge_producer/rssbridge_producer_kafka_producer

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run unit tests
        run: pytest tests/test_rssbridge_unit.py -v --tb=short

      - name: Run integration tests
        run: pytest tests/test_rssbridge_integration.py -v --tb=short

      - name: Run e2e tests
        run: pytest tests/test_rssbridge_e2e.py -v --tb=short

      - name: Run all tests with coverage
        run: pytest tests/ -v --cov=rssbridge --cov-report=term-missing --cov-report=xml --cov-fail-under=30

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: always()
        with:
          file: ./feeders/rss/coverage.xml
          flags: rss
          name: rss-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

name: PegelOnline Producer Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'pegelonline/**'
      - '.github/workflows/test-pegelonline.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'pegelonline/**'
      - '.github/workflows/test-pegelonline.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pegelonline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test runner
        run: pip install pytest pytest-cov pytest-asyncio requests-mock

      - name: Install generated producer packages
        run: |
          pip install ./pegelonline_producer/pegelonline_producer_data
          pip install ./pegelonline_producer/pegelonline_producer_kafka_producer
          pip install ./pegelonline_mqtt_producer/pegelonline_mqtt_producer_data
          pip install ./pegelonline_mqtt_producer/pegelonline_mqtt_producer_mqtt_client

      - name: Install transport-agnostic core and transport apps
        run: |
          pip install ./pegelonline_core
          pip install ./pegelonline_kafka
          pip install ./pegelonline_mqtt

      - name: Run unit tests
        run: pytest tests/test_pegelonline_unit.py -v --tb=short -p no:cacheprovider --override-ini="addopts="

      - name: Run integration tests
        run: pytest tests/test_pegelonline_integration.py -v --tb=short -p no:cacheprovider --override-ini="addopts="

      - name: Run Kafka app tests
        run: pytest tests/test_pegelonline_kafka_app.py -v --tb=short -p no:cacheprovider --override-ini="addopts="

      - name: Run MQTT app tests
        run: pytest tests/test_pegelonline_mqtt_app.py -v --tb=short -p no:cacheprovider --override-ini="addopts="

      - name: Run all tests with coverage
        run: |
          pytest tests/ -v \
            --ignore=tests/test_pegelonline_e2e.py \
            --cov=pegelonline_core --cov=pegelonline_kafka --cov=pegelonline_mqtt \
            --cov-report=term-missing --cov-report=xml --cov-fail-under=20 \
            -p no:cacheprovider --override-ini="addopts="

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        if: always()
        with:
          file: ./pegelonline/coverage.xml
          flags: pegelonline
          name: pegelonline-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

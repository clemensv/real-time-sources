name: Update root README catalog

on:
  push:
    branches: [ main ]
    paths:
      - catalog.json
      - '**/xreg/*.xreg.json'
      - tools/docs/generate_root_catalog.py
      - tools/docs/upstream_links.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Regenerate root README catalog block
        run: python tools/docs/generate_root_catalog.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: regenerate root README catalog block" -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push

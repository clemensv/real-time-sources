name: Publish Notebook Wheels

# Build per-source wheel bundles for sources marked `notebook: true` in
# catalog.json and publish them as assets on the `notebook-wheels` release
# so deploy-feeder-notebook.ps1 can download them from Cloud Shell without
# needing to build them locally.
#
# The release tag is fixed (`notebook-wheels`) and recreated on every push.

on:
  push:
    branches: [ "main" ]
    paths:
      - 'catalog.json'
      - '**/pyproject.toml'
      - '**/poetry.lock'
      - '**/notebook/*.ipynb'
      - 'tools/deploy-fabric/strip-wheel-pathdeps.py'
      - '.github/workflows/publish-notebook-wheels.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/publish-notebook-wheels.yml'
      - 'tools/deploy-fabric/strip-wheel-pathdeps.py'
  workflow_dispatch:

permissions:
  contents: write

# The release tag is fixed (`notebook-wheels`) and is deleted + recreated on
# every run. Concurrent runs (e.g. a burst of merges to main) would otherwise
# race: one job deletes the release another job is mid-upload to, yielding
# `HTTP 404` on asset upload and leaving the release deleted. Serialize on a
# single group and cancel superseded in-flight runs so only the newest push
# publishes — the release always reflects the latest commit on main.
concurrency:
  group: publish-notebook-wheels
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      sources: ${{ steps.pick.outputs.sources }}
      count: ${{ steps.pick.outputs.count }}
    steps:
      - uses: actions/checkout@v7
      - id: pick
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, pathlib, sys
          catalog = json.loads(pathlib.Path('catalog.json').read_text(encoding='utf-8'))
          ids = []
          skipped = []
          for c in catalog:
              if not c.get('notebook'):
                  continue
              sid = c['id']
              # Some catalog entries are forward-looking and have no source
              # directory checked in yet. Skip them so the matrix doesn't fail.
              if not (pathlib.Path('feeders') / sid).is_dir():
                  skipped.append(sid)
                  continue
              ids.append(sid)
          if skipped:
              print(f"::notice::Skipping notebook sources without source dir: {skipped}", file=sys.stderr)
          print(f"sources={json.dumps(ids)}")
          print(f"count={len(ids)}")
          PY
      - run: |
          echo "Selected sources: ${{ steps.pick.outputs.sources }}"
          echo "Count: ${{ steps.pick.outputs.count }}"

  build:
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.discover.outputs.sources) }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Compute package id (hyphens → underscores)
        id: pkg
        run: |
          src="${{ matrix.source }}"
          echo "id=${src//-/_}" >> "$GITHUB_OUTPUT"

      - name: Detect package layout
        id: layout
        # Sources used to live as a single top-level package (legacy layout):
        #   <src>/pyproject.toml      + <src>/<id>_producer/*/
        # After the multi-transport split (PR #338+) they look like:
        #   <src>/<id>_kafka/pyproject.toml      (bridge / notebook target)
        #   <src>/<id>_core/pyproject.toml       (shared package)
        #   <src>/<id>_kafka_producer/*/         (generated producer subpkgs)
        # Some split sources still keep the legacy <id>_producer/ tree as the
        # source of producer path-deps; support either name.
        run: |
          src="feeders/${{ matrix.source }}"
          id="${{ steps.pkg.outputs.id }}"
          if [ -f "$src/${id}_kafka/pyproject.toml" ]; then
            echo "split=true" >> "$GITHUB_OUTPUT"
            echo "pkg_root=./$src/${id}_kafka" >> "$GITHUB_OUTPUT"
          else
            echo "split=false" >> "$GITHUB_OUTPUT"
            echo "pkg_root=./$src" >> "$GITHUB_OUTPUT"
          fi
          if [ -d "$src/${id}_core" ] && [ -f "$src/${id}_core/pyproject.toml" ]; then
            echo "core_dir=./$src/${id}_core" >> "$GITHUB_OUTPUT"
          else
            echo "core_dir=" >> "$GITHUB_OUTPUT"
          fi
          if [ -d "$src/${id}_kafka_producer" ]; then
            echo "producer_dir=./$src/${id}_kafka_producer" >> "$GITHUB_OUTPUT"
          elif [ -d "$src/${id}_rt_producer" ]; then
            echo "producer_dir=./$src/${id}_rt_producer" >> "$GITHUB_OUTPUT"
          elif [ -d "$src/${id}_producer" ]; then
            echo "producer_dir=./$src/${id}_producer" >> "$GITHUB_OUTPUT"
          else
            echo "producer_dir=" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify notebook + producer present
        run: |
          test -f "feeders/${{ matrix.source }}/notebook/${{ matrix.source }}-feed.ipynb" \
            || { echo "::error::Missing notebook for ${{ matrix.source }}"; exit 1; }
          producer_dir="${{ steps.layout.outputs.producer_dir }}"
          if [ -z "$producer_dir" ] || [ ! -d "$producer_dir" ]; then
            echo "::error::Missing generated producer for ${{ matrix.source }} (looked for feeders/${{ matrix.source }}/${{ steps.pkg.outputs.id }}_kafka_producer or feeders/${{ matrix.source }}/${{ steps.pkg.outputs.id }}_producer)"
            exit 1
          fi
          echo "Using producer dir: $producer_dir"
          echo "Using bridge pkg root: ${{ steps.layout.outputs.pkg_root }}"
          if [ -n "${{ steps.layout.outputs.core_dir }}" ]; then
            echo "Using core dir: ${{ steps.layout.outputs.core_dir }}"
          fi

      - name: Build wheels
        run: |
          python -m pip install --upgrade pip wheel poetry-core
          mkdir -p _wheels-out
          # Bridge package (notebook target — kafka sibling for split sources,
          # top-level legacy package otherwise).
          python -m pip wheel --no-deps --no-build-isolation \
            --wheel-dir _wheels-out "${{ steps.layout.outputs.pkg_root }}"
          # Shared core package (split layout only).
          if [ -n "${{ steps.layout.outputs.core_dir }}" ]; then
            python -m pip wheel --no-deps --no-build-isolation \
              --wheel-dir _wheels-out "${{ steps.layout.outputs.core_dir }}"
          fi
          # Producer sub-packages (skip any without pyproject.toml such as samples/).
          for sub in "${{ steps.layout.outputs.producer_dir }}"/*/ ; do
            if [ -f "$sub/pyproject.toml" ]; then
              echo "Building $sub"
              python -m pip wheel --no-deps --no-build-isolation \
                --wheel-dir _wheels-out "$sub"
            fi
          done

      - name: Strip poetry path-deps from wheel METADATA
        run: |
          python tools/deploy-fabric/strip-wheel-pathdeps.py _wheels-out/*.whl

      - name: Compute commit short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Write manifest
        run: |
          python - <<'PY'
          import json, pathlib, datetime, os
          out = pathlib.Path('_wheels-out')
          wheels = sorted(p.name for p in out.glob('*.whl'))
          manifest = {
              'source': '${{ matrix.source }}',
              'commit': '${{ github.sha }}',
              'shortCommit': '${{ steps.sha.outputs.short }}',
              'built_utc': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'wheels': wheels,
          }
          (out / 'manifest.json').write_text(json.dumps(manifest, indent=2))
          print(json.dumps(manifest, indent=2))
          PY

      - name: Bundle wheels
        run: |
          cd _wheels-out
          zip -j "../${{ matrix.source }}-notebook-wheels.zip" *.whl manifest.json
          ls -la ../${{ matrix.source }}-notebook-wheels.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.source }}-notebook-wheels
          path: ${{ matrix.source }}-notebook-wheels.zip
          retention-days: 7

  publish:
    needs: [discover, build]
    if: needs.discover.outputs.count != '0' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: bundles
          pattern: '*-notebook-wheels'
          merge-multiple: true

      - name: List bundles
        run: ls -la bundles/

      - name: Recreate `notebook-wheels` release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if gh release view notebook-wheels >/dev/null 2>&1; then
            gh release delete notebook-wheels --yes --cleanup-tag
          fi
          notes=$(cat <<EOF
          Per-source wheel bundles for Fabric notebook deployments.

          Each \`<source>-notebook-wheels.zip\` contains the bridge wheel,
          the 2 generated producer sub-package wheels, and a \`manifest.json\`
          with the source commit SHA. Path-dep \`file://\` URLs are stripped
          from wheel METADATA.

          Consumed by \`tools/deploy-fabric/deploy-feeder-notebook.ps1\`.
          Refreshed on every push to \`main\` that touches a notebook source
          or the wheel build pipeline.

          Built from commit ${{ github.sha }}.
          EOF
          )
          gh release create notebook-wheels \
            --title "Notebook wheels (latest from main)" \
            --notes "$notes" \
            --target ${{ github.sha }} \
            bundles/*.zip

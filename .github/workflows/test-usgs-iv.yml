name: USGS-IV Producer Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'feeders/usgs-iv/**'
      - '.github/workflows/test-usgs-iv.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'feeders/usgs-iv/**'
      - '.github/workflows/test-usgs-iv.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./feeders/usgs-iv
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install generated producer packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./usgs_iv_producer/usgs_iv_producer_data
          python -m pip install -e ./usgs_iv_producer/usgs_iv_producer_kafka_producer

      - name: Install test dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run unit tests
        run: pytest tests/test_usgs_unit.py -v --tb=short

      - name: Run integration tests
        run: pytest tests/test_usgs_integration.py -v --tb=short

      - name: Run all tests with coverage
        run: pytest tests/ -v --cov=usgs_iv --cov-report=term-missing --cov-report=xml --cov-fail-under=20

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        if: always()
        with:
          file: ./feeders/usgs-iv/coverage.xml
          flags: usgs-iv
          name: usgs-iv-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

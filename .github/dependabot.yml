version: 2
updates:
  # GitHub Actions workflows in the repository root.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python feeders and their generated producer packages.
  #
  # A single glob entry covers every current and future feeder
  # directory (the bridge package plus the *_producer/*_producer_data
  # and *_producer_*_producer transport packages). Listing each
  # directory individually pushed the `updates` array past
  # Dependabot's hard limit of 200 entries; the `directories` glob is
  # the recommended monorepo pattern and stays well under that limit
  # while still opening per-directory update PRs.
  - package-ecosystem: "pip"
    directories:
      - "/feeders/**"
    schedule:
      interval: "weekly"
    ignore:
      # The generated CloudEvents producers and bridges target the
      # cloudevents 1.x API surface (cloudevents.http/conversion/kafka).
      # The repo convention pins `cloudevents>=1.12.1,<2.0.0` fleet-wide;
      # do not let Dependabot push individual feeders to 2.x and split
      # the fleet. Re-evaluate as a deliberate, fleet-wide migration.
      - dependency-name: "cloudevents"
        update-types: ["version-update:semver-major"]

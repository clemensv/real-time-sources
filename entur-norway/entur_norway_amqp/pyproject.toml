[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "entur_norway_amqp"
version = "0.1.0"
description = "AMQP 1.0 companion feeder for entur-norway."
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "entur_norway_amqp" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
python-qpid-proton = ">=0.40.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
azure-identity = ">=1.17.0"
azure-core = ">=1.30.0"
entur_norway_amqp_producer_data = { path = "../entur_norway_amqp_producer/entur_norway_amqp_producer_data" }
entur_norway_amqp_producer_amqp_producer = { path = "../entur_norway_amqp_producer/entur_norway_amqp_producer_amqp_producer" }

[tool.poetry.scripts]
entur-norway-amqp = "entur_norway_amqp.app:main"

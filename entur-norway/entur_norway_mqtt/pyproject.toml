[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "entur-norway-mqtt"
version = "0.1.0"
description = "Entur Norway bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
requests = ">=2.32.3"
entur_norway_producer_data = {path = "../entur_norway_producer/entur_norway_producer_data"}
entur_norway_mqtt_producer_data = {path = "../entur_norway_mqtt_producer/entur_norway_mqtt_producer_data"}
entur_norway_mqtt_producer_mqtt_client = {path = "../entur_norway_mqtt_producer/entur_norway_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
entur-norway-mqtt = "entur_norway_mqtt:main"

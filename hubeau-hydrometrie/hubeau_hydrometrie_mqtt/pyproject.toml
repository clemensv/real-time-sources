[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "hubeau-hydrometrie-mqtt"
version = "0.1.0"
packages = [{include = "hubeau_hydrometrie_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
hubeau_hydrometrie_mqtt_producer_data = {path = "../hubeau_hydrometrie_mqtt_producer/hubeau_hydrometrie_mqtt_producer_data"}
hubeau_hydrometrie_mqtt_producer_mqtt_client = {path = "../hubeau_hydrometrie_mqtt_producer/hubeau_hydrometrie_mqtt_producer_mqtt_client"}

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "snotel-amqp"
version = "0.1.0"
packages = [{include = "snotel_amqp"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
azure-identity = ">=1.17.0"
dataclasses_json = ">=0.6.7"
snotel_amqp_producer_data = {path = "../snotel_amqp_producer/snotel_amqp_producer_data"}
snotel_amqp_producer_amqp_producer = {path = "../snotel_amqp_producer/snotel_amqp_producer_amqp_producer"}

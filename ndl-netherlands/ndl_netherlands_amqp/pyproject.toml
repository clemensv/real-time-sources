[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ndl-netherlands-amqp"
version = "0.1.0"
description = "AMQP companion feeder for NDL Netherlands"
requires-python = ">=3.10"
dependencies = ["python-qpid-proton>=0.40.0"]

[project.scripts]
ndl-netherlands-amqp = "ndl_netherlands_amqp.app:main"

[tool.setuptools.packages.find]
include = ["ndl_netherlands_amqp*"]

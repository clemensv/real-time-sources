[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ndl-netherlands-mqtt"
version = "0.1.0"
description = "MQTT companion feeder for NDL Netherlands"
requires-python = ">=3.10"
dependencies = ["paho-mqtt>=2.1.0"]

[project.scripts]
ndl-netherlands-mqtt = "ndl_netherlands_mqtt.app:main"

[tool.setuptools.packages.find]
include = ["ndl_netherlands_mqtt*"]

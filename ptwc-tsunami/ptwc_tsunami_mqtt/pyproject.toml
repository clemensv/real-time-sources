[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "ptwc-tsunami-mqtt"
version = "0.1.0"
description = "PTWC/NTWC tsunami bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
ptwc_tsunami_producer_data = {path = "../ptwc_tsunami_producer/ptwc_tsunami_producer_data"}
ptwc_tsunami_mqtt_producer_data = {path = "../ptwc_tsunami_mqtt_producer/ptwc_tsunami_mqtt_producer_data"}
ptwc_tsunami_mqtt_producer_mqtt_client = {path = "../ptwc_tsunami_mqtt_producer/ptwc_tsunami_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
ptwc-tsunami-mqtt = "ptwc_tsunami_mqtt:main"

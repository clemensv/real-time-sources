[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "singapore-nea-amqp"
version = "0.1.0"
description = "AMQP feeder for singapore-nea"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "singapore_nea_amqp" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
python-qpid-proton = ">=0.40.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
singapore_nea_amqp_producer_data = { path = "../singapore_nea_amqp_producer/singapore_nea_amqp_producer_data" }

[tool.poetry.scripts]
singapore-nea-amqp = "singapore_nea_amqp.app:main"

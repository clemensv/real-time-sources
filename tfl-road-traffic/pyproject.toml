[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "tfl-road-traffic"
version = "0.1.0"
description = "Transport for London (TfL) road traffic bridge to Apache Kafka"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "tfl_road_traffic" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses-json = ">=0.6.7"
avro = ">=1.11.3"
tfl_road_traffic_producer_data = { path = "tfl_road_traffic_producer/tfl_road_traffic_producer_data" }
tfl_road_traffic_producer_kafka_producer = { path = "tfl_road_traffic_producer/tfl_road_traffic_producer_kafka_producer" }

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
testcontainers = ">=4.8.1"

[tool.poetry.scripts]
tfl-road-traffic = "tfl_road_traffic:main"

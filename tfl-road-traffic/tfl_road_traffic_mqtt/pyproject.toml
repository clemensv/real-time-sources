[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "tfl-road-traffic-mqtt"
version = "0.1.0"
description = "Transport for London road traffic MQTT/UNS bridge"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "tfl_road_traffic_mqtt" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
paho-mqtt = ">=2.1.0"
azure-identity = ">=1.17.0"
tfl-road-traffic = { path = ".." }
tfl_road_traffic_mqtt_producer_data = { path = "../tfl_road_traffic_mqtt_producer/tfl_road_traffic_mqtt_producer_data" }
tfl_road_traffic_mqtt_producer_mqtt_client = { path = "../tfl_road_traffic_mqtt_producer/tfl_road_traffic_mqtt_producer_mqtt_client" }

[tool.poetry.scripts]
tfl-road-traffic-mqtt = "tfl_road_traffic_mqtt.app:main"

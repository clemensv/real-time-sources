[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nextbus-mqtt"
version = "0.1.0"
description = "MQTT companion feeder for Nextbus"
requires-python = ">=3.10"
dependencies = ["paho-mqtt>=2.1.0"]

[project.scripts]
nextbus-mqtt = "nextbus_mqtt.app:main"

[tool.setuptools.packages.find]
include = ["nextbus_mqtt*"]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "nextbus"
version = "0.1.0"
description = "A project to fetch data from NextBus API"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.10"
requests = "^2.31.0"
azure-eventhub = "^5.15.1"
cloudevents = ">=1.9.0,<2.0.0"

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
nextbus = "nextbus:main"

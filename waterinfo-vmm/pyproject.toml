[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "waterinfo_vmm"
version = "0.1.0"
requires-python = ">=3.9"
dependencies = [
    "confluent_kafka",
    "cloudevents",
    "requests",
    "dataclasses-json",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "pytest-asyncio",
    "requests-mock",
    "testcontainers[kafka]",
]

[project.scripts]
waterinfo_vmm = "waterinfo_vmm.waterinfo_vmm:main"

[tool.setuptools.packages.find]
include = ["waterinfo_vmm*"]

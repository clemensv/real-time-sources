[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "waterinfo-vmm"
version = "0.1.0"
description = "Belgian Waterinfo VMM (Flanders) bridge to Apache Kafka"
authors = ["Clemens Vasters"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
waterinfo_vmm_producer_data = {path = "waterinfo_vmm_producer/waterinfo_vmm_producer_data"}
waterinfo_vmm_producer_kafka_producer = {path = "waterinfo_vmm_producer/waterinfo_vmm_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
pytest-cov = ">=5.0.0"
pytest-asyncio = ">=0.23.0"
testcontainers = ">=4.8.1"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
waterinfo-vmm = "waterinfo_vmm.waterinfo_vmm:main"

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "waterinfo-vmm-amqp"
version = "0.1.0"
packages = [{include = "waterinfo_vmm_amqp"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
azure-identity = ">=1.17.0"
dataclasses_json = ">=0.6.7"
waterinfo_vmm_amqp_producer_data = {path = "../waterinfo_vmm_amqp_producer/waterinfo_vmm_amqp_producer_data"}
waterinfo_vmm_amqp_producer_amqp_producer = {path = "../waterinfo_vmm_amqp_producer/waterinfo_vmm_amqp_producer_amqp_producer"}

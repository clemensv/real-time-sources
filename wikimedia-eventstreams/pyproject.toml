[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "wikimedia-eventstreams"
version = "0.1.0"
description = "Wikimedia EventStreams recentchange bridge to Kafka as CloudEvents"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
readme = "README.md"
packages = [{include = "wikimedia_eventstreams"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
wikimedia_eventstreams_producer_data = {path = "wikimedia_eventstreams_producer/wikimedia_eventstreams_producer_data"}
wikimedia_eventstreams_producer_kafka_producer = {path = "wikimedia_eventstreams_producer/wikimedia_eventstreams_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
pytest-asyncio = ">=0.24.0"
pytest-cov = ">=5.0.0"

[tool.poetry.scripts]
wikimedia-eventstreams = "wikimedia_eventstreams.wikimedia_eventstreams:main"

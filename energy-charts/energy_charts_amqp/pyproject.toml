[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "energy-charts-amqp"
version = "0.1.0"
description = "energy-charts AMQP companion feeder"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
python-qpid-proton = ">=0.39.0"
azure-identity = ">=1.16.0"
energy_charts_amqp_producer_data = {path = "../energy_charts_amqp_producer/energy_charts_amqp_producer_data"}
energy_charts_amqp_producer_amqp_producer = {path = "../energy_charts_amqp_producer/energy_charts_amqp_producer_amqp_producer"}

[tool.poetry.scripts]
energy-charts-amqp = "energy_charts_amqp:main"

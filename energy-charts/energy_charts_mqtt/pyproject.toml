[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "energy-charts-mqtt"
version = "0.1.0"
description = "energy-charts MQTT companion feeder"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
energy_charts_mqtt_producer_data = {path = "../energy_charts_mqtt_producer/energy_charts_mqtt_producer_data"}
energy_charts_mqtt_producer_mqtt_client = {path = "../energy_charts_mqtt_producer/energy_charts_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
energy-charts-mqtt = "energy_charts_mqtt:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "irceline-belgium-amqp"
version = "0.1.0"
description = "irceline-belgium AMQP companion feeder"
requires-python = ">=3.10"
dependencies = ['python-qpid-proton>=0.39.0', 'azure-identity>=1.15.0']

[tool.setuptools.packages.find]
where = ["."]

[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "elexon-bmrs-mqtt"
version = "0.1.0"
description = "elexon-bmrs MQTT companion feeder"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
elexon_bmrs_mqtt_producer_data = {path = "../elexon_bmrs_mqtt_producer/elexon_bmrs_mqtt_producer_data"}
elexon_bmrs_mqtt_producer_mqtt_client = {path = "../elexon_bmrs_mqtt_producer/elexon_bmrs_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
elexon-bmrs-mqtt = "elexon_bmrs_mqtt:main"

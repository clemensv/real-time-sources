[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ndw-road-traffic-mqtt"
version = "0.1.0"
description = "MQTT companion feeder for NDW Road Traffic"
requires-python = ">=3.10"
dependencies = ["paho-mqtt>=2.1.0"]

[project.scripts]
ndw-road-traffic-mqtt = "ndw_road_traffic_mqtt.app:main"

[tool.setuptools.packages.find]
include = ["ndw_road_traffic_mqtt*"]

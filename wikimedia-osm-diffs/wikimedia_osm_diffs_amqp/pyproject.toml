[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wikimedia-osm-diffs-amqp"
version = "0.1.0"
description = "AMQP 1.0 feeder for Wikimedia OSM diffs"
requires-python = ">=3.10"
dependencies = [
    "python-qpid-proton>=0.40.0",
    "cloudevents>=1.11.0,<2.0.0",
    "dataclasses_json>=0.6.7",
    "avro>=1.11.3",
    "azure-identity>=1.17.0",
    "azure-core>=1.30.0",
    "requests>=2.31.0",
]

[project.scripts]
wikimedia-osm-diffs-amqp = "wikimedia_osm_diffs_amqp.app:main"

[tool.setuptools.packages.find]
include = ["wikimedia_osm_diffs_amqp*"]

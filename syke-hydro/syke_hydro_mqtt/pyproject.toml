[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "syke-hydro-mqtt"
version = "0.1.0"
packages = [{include = "syke_hydro_mqtt"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
paho-mqtt = ">=2.1.0"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
syke_hydro_mqtt_producer_data = {path = "../syke_hydro_mqtt_producer/syke_hydro_mqtt_producer_data"}
syke_hydro_mqtt_producer_mqtt_client = {path = "../syke_hydro_mqtt_producer/syke_hydro_mqtt_producer_mqtt_client"}

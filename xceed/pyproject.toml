[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "xceed"
version = "0.1.0"
description = "Bridge between the Xceed Open Event API and Kafka endpoints"
authors = []
readme = "README.md"
packages = [{ include = "xceed" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
confluent-kafka = ">=2.5.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
avro = ">=1.11.3"
xceed_producer_data = {path = "xceed_producer/xceed_producer_data"}
xceed_producer_kafka_producer = {path = "xceed_producer/xceed_producer_kafka_producer"}

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
pytest-cov = ">=5.0.0"
requests-mock = ">=1.12.1"

[tool.poetry.scripts]
xceed = "xceed:main"

[project]
name = "kmi_belgium_mqtt"
version = "0.1.0"
description = "kmi-belgium MQTT companion feeder"
requires-python = ">=3.10"
dependencies = [
  "paho-mqtt>=2.1.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["kmi_belgium_mqtt"]

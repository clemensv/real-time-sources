[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "noaa-ndbc-amqp"
version = "0.1.0"
packages = [{include = "noaa_ndbc_amqp"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
azure-identity = ">=1.17.0"
dataclasses_json = ">=0.6.7"
noaa_ndbc_amqp_producer_data = {path = "../noaa_ndbc_amqp_producer/noaa_ndbc_amqp_producer_data"}
noaa_ndbc_amqp_producer_amqp_producer = {path = "../noaa_ndbc_amqp_producer/noaa_ndbc_amqp_producer_amqp_producer"}

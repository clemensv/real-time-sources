[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "nina-bbk"
version = "0.1.0"
description = "NINA/BBK German civil protection warnings bridge"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]
packages = [{ include = "nina_bbk" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
avro = ">=1.12.1"
cloudevents = ">=1.11.0,<2.0.0"
confluent-kafka = ">=2.5.3"
dataclasses-json = ">=0.6.7"
nina_bbk_producer_data = { path = "nina_bbk_producer/nina_bbk_producer_data" }
nina_bbk_producer_kafka_producer = { path = "nina_bbk_producer/nina_bbk_producer_kafka_producer" }

[tool.poetry.dev-dependencies]
pytest = ">=8.3.3"
pytest-asyncio = ">=0.24.0"
pytest-cov = ">=7.0.0"

[tool.poetry.scripts]
nina-bbk = "nina_bbk.nina_bbk:main"

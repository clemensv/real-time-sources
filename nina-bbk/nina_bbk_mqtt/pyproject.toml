[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "nina-bbk-mqtt"
version = "0.1.0"
description = "NINA/BBK bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
aiohttp = ">=3.10.5"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
nina_bbk_producer_data = {path = "../nina_bbk_producer/nina_bbk_producer_data"}
nina_bbk_mqtt_producer_data = {path = "../nina_bbk_mqtt_producer/nina_bbk_mqtt_producer_data"}
nina_bbk_mqtt_producer_mqtt_client = {path = "../nina_bbk_mqtt_producer/nina_bbk_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
nina-bbk-mqtt = "nina_bbk_mqtt:main"

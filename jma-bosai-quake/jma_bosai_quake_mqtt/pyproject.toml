[build-system]
requires = ["poetry-core>=1.1.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "jma-bosai-quake-mqtt"
version = "0.1.0"
description = "JMA Bosai earthquake bridge to MQTT/UNS"
authors = ["Clemens Vasters <clemensv@microsoft.com>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.3"
cloudevents = ">=1.11.0,<2.0.0"
dataclasses_json = ">=0.6.7"
paho-mqtt = ">=2.1.0"
jma_bosai_quake = {path = ".."}
jma_bosai_quake_producer_data = {path = "../jma_bosai_quake_producer/jma_bosai_quake_producer_data"}
jma_bosai_quake_mqtt_producer_data = {path = "../jma_bosai_quake_mqtt_producer/jma_bosai_quake_mqtt_producer_data"}
jma_bosai_quake_mqtt_producer_mqtt_client = {path = "../jma_bosai_quake_mqtt_producer/jma_bosai_quake_mqtt_producer_mqtt_client"}

[tool.poetry.scripts]
jma-bosai-quake-mqtt = "jma_bosai_quake_mqtt:main"
